<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Online Carrom</title>
    <style>
        body { background: #050510; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 5px solid gold; background: #fdf5e6; cursor: crosshair; }
        .info { margin-bottom: 10px; color: gold; font-size: 20px; }
    </style>
</head>
<body>

    <div class="info" id="status">ක්‍රීඩාව ආරම්භ වෙමින්...</div>
    <canvas id="carromBoard" width="400" height="400"></canvas>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            // ඔයාගේ Dashboard එකේ තියෙන ඒ Config එකම මෙතනට දාන්න
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId'); // waiting.html එකෙන් එන ID එක
        const canvas = document.getElementById("carromBoard");
        const ctx = canvas.getContext("2d");

        // ඉත්තෝ අඳින Function එක
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // මෙතනට ඔයාගේ Carrom Board design එක සහ කාසි අඳින කෝඩ් එක දාන්න
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "black";
            ctx.strokeRect(50, 50, 300, 300); // උදාහරණයක් විදිහට
        }

        // Firebase එකෙන් දත්ත ගෙන ඉත්තෝ පෙන්වීම
        if (matchId) {
            db.collection("active_matches").doc(matchId).onSnapshot(doc => {
                if (doc.exists) {
                    const gameData = doc.data();
                    document.getElementById("status").innerText = "තරඟය ක්‍රියාත්මකයි!";
                    // මෙතනදී gameData වල තියෙන ඉත්තන්ගේ පිහිටුම (Position) අනුව board එක update කරන්න
                    drawBoard();
                }
            });
        } else {
            document.getElementById("status").innerText = "Error: Room එකක් හමු නොවුණි.";
        }
    </script>
</body>
</html>
