<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISSA PRO - Online</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { margin: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #game-container { position: relative; border: 20px solid #5c3a21; border-radius: 30px; width: 90vw; height: 90vw; max-width: 500px; max-height: 500px; background: #f3e5ab; margin-top: 20px; }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="overlay"><h1>ක්‍රීඩකයා එනතුරු රැඳී සිටින්න...</h1></div>
        <canvas id="carromCanvas"></canvas>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            databaseURL: "https://vissaprocarrom-default-rtdb.firebaseio.com",
            projectId: "vissaprocarrom"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Match Logic
        const matchId = "match_001"; // ඔයාට ඕනේ නම් මේක වෙනස් කරන්න පුළුවන්
        let myRole = "";

        // 1. ප්ලේයර් කවුද කියලා තීරණය කරමු
        db.ref('matches/' + matchId).transaction(function(data) {
            if (!data) return { P1: true };
            if (!data.P2) return { P1: data.P1, P2: true };
            return data;
        }, function(error, committed, snapshot) {
            if (committed) {
                const val = snapshot.val();
                myRole = val.P2 ? "P2" : "P1";
                checkStart();
            }
        });

        // 2. දෙන්නම ආවම ගේම් එක පටන් ගන්න
        function checkStart() {
            db.ref('matches/' + matchId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data.P1 && data.P2) {
                    document.getElementById('overlay').style.display = 'none';
                    startCarromGame(); // මෙතනින් තමයි ඔයාගේ game logic එක පටන් ගන්නේ
                }
            });
        }

        function startCarromGame() {
            console.log("Game Starting as: " + myRole);
            // මෙතනට ඔයාගේ Physics සහ Game Loop එක දාන්න
        }
    </script>
</body>
</html>
