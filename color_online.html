<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vissa-Pro Firebase Battle</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #0f0f0f; --card: #1e1e1e; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            /* Buttons උඩට ගැනීමට පහළින් විශාල ඉඩක් තැබීම */
            padding-bottom: 80px; 
        }

        .match-header { 
            background: var(--card); 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-bottom: 3px solid var(--primary); 
        }

        .p-name { font-size: 12px; color: gold; font-weight: bold; text-transform: uppercase; }
        .p-balance { font-size: 16px; font-weight: bold; }
        
        #timer-wrap { width: 100%; height: 6px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .game-zone { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            padding: 10px;
            margin-bottom: 20px; /* Game Buttons සහ පහළ Buttons අතර පරතරය */
        }

        #display-word { 
            font-size: 45px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .btn-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            width: 85%; 
            max-width: 340px; 
        }

        .color-btn { 
            height: 65px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #000;
        }

        /* මෙන්න මේ කොටසින් තමයි Buttons උඩට ගන්නේ */
        .footer { 
            position: fixed;
            bottom: 30px; /* Screen එකේ යට ඉඳන් 30px උඩට ගත්තා */
            left: 0;
            width: 100%;
            background: transparent; 
            padding: 0 15px;
            display: flex; 
            gap: 10px; 
            box-sizing: border-box;
            z-index: 100;
        }

        .action-btn { 
            flex: 1; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            text-transform: uppercase;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="match-header">
        <div style="text-align:center">
            <div id="my-name-ui" class="p-name">ඔබ</div>
            <div id="my-bal-ui" class="p-balance">Rs. 0</div>
        </div>
        <div style="color:var(--secondary); font-weight:bold; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px;">
            POT: <span id="pot-ui">Rs. 0</span>
        </div>
        <div style="text-align:center">
            <div id="opp-name-ui" class="p-name">ප්‍රතිවාදියා</div>
            <div id="opp-bal-ui" class="p-balance">Rs. 0</div>
        </div>
    </div>

    <div id="timer-wrap"><div id="timer-fill"></div></div>

    <main class="game-zone">
        <div id="display-word">READY</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="handleInput('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="handleInput('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="handleInput('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="handleInput('yellow')"></button>
        </div>
    </main>

    <footer class="footer">
        <button id="btn-bet" class="action-btn" style="background:var(--primary)" onclick="startBet()">START BET</button>
        <button id="btn-cashout" class="action-btn" style="background:var(--secondary)" onclick="cashOut()">CASH OUT</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let roomId = "battle_room_1";
        let myUid = "";
        let myRole = "";
        let isGameActive = false;
        let myBal = 0;

        auth.onAuthStateChanged(user => {
            if(user) {
                myUid = user.uid;
                initMatch();
            } else {
                window.location.href = "index.html";
            }
        });

        function initMatch() {
            // Player Role එක තීරණය කිරීම (P1/P2)
            const roomRef = db.ref('rooms/' + roomId);
            roomRef.child('players').once('value', snap => {
                let players = snap.val();
                if(!players) {
                    myRole = "p1";
                    roomRef.child('players/p1').set(myUid);
                } else if(!players.p2 && players.p1 !== myUid) {
                    myRole = "p2";
                    roomRef.child('players/p2').set(myUid);
                } else {
                    myRole = (players.p1 === myUid) ? "p1" : "p2";
                }

                // නම් ලබා ගැනීම (Real-time Firestore/Database එකෙන්)
                // සටහන: Profile එකේ සේව් කරපු නම පෙන්වීමට මෙතන db.ref('users') පාවිච්චි වේ
                db.ref('users/' + myUid).on('value', s => {
                    if(s.exists()) {
                        document.getElementById('my-name-ui').innerText = s.val().userName || "ඔබ";
                        myBal = s.val().balance || 0;
                        document.getElementById('my-bal-ui').innerText = "Rs. " + myBal;
                    }
                });

                monitorRoom(roomRef);
            });
        }

        function monitorRoom(roomRef) {
            roomRef.on('value', snap => {
                let data = snap.val();
                if(data && data.players) {
                    let oppRole = (myRole === "p1") ? "p2" : "p1";
                    let oppUid = data.players[oppRole];
                    
                    if(oppUid) {
                        db.ref('users/' + oppUid).once('value', s => {
                            document.getElementById('opp-name-ui').innerText = s.val().userName || "ප්‍රතිවාදියා";
                            document.getElementById('opp-bal-ui').innerText = "Rs. " + (s.val().balance || 0);
                        });
                    }

                    // දෙන්නම Ready නම් පටන් ගන්න
                    if(data.p1_ready && data.p2_ready && !isGameActive) {
                        beginMatch();
                    }
                }
            });
        }

        function startBet() {
            if(myBal < 15) return alert("සල්ලි මදි!");
            db.ref('rooms/' + roomId + '/' + myRole + '_ready').set(true);
            document.getElementById('btn-bet').innerText = "WAITING...";
            document.getElementById('btn-bet').disabled = true;
            document.getElementById('btn-bet').style.opacity = "0.6";
        }

        function beginMatch() {
            isGameActive = true;
            document.getElementById('pot-ui').innerText = "Rs. 30";
            document.getElementById('btn-bet').innerText = "LIVE!";
            // මෙතනින් ඉදිරියට Game Logic එක ක්‍රියාත්මක වේ...
        }

        function cashOut() {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
