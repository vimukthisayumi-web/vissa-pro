<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vissa-Pro Battle Mode (Hard)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .match-header { background: var(--card); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid var(--primary); }
        .p-balance { font-size: 20px; font-weight: bold; color: gold; }
        #timer-wrap { width: 100%; height: 6px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }
        .game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 110px; }
        #display-word { font-size: 50px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; }
        
        /* 6 Buttons Grid */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 95%; max-width: 400px; }
        .color-btn { height: 70px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #000; }
        
        .footer { position: fixed; bottom: 25px; left: 0; right: 0; background: var(--card); padding: 15px; display: flex; gap: 10px; margin: 0 15px; border-radius: 15px; border: 1px solid #333; z-index: 100; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="match-header">
        <div style="text-align:center">
            <div style="font-size:10px; color:#888;">GAME WALLET (<span id="role-ui">...</span>)</div>
            <div id="my-bal-ui" class="p-balance">Rs. 0.00</div>
        </div>
        <div style="color:var(--secondary); font-weight:bold; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px;">
            POT: <span id="pot-ui">Rs. 0</span>
        </div>
        <div style="text-align:center">
            <div style="font-size:10px; color:#888;">ප්‍රතිවාදියා</div>
            <div id="opp-bal-ui" class="p-balance">WAITING</div>
        </div>
    </div>

    <div id="timer-wrap"><div id="timer-fill"></div></div>

    <main class="game-zone">
        <div id="display-word">READY</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="handleInput('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="handleInput('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="handleInput('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="handleInput('yellow')"></button>
            <button class="color-btn" style="background:#a020f0" onclick="handleInput('purple')"></button>
            <button class="color-btn" style="background:#ffffff" onclick="handleInput('white')"></button>
        </div>
    </main>

    <footer class="footer">
        <button id="btn-bet" class="action-btn" style="background:var(--primary)" onclick="startBet()">START BET (Rs. 15)</button>
        <button id="btn-cashout" class="action-btn" style="background:var(--secondary)" onclick="cashOut()">EXIT & SAVE</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const fs = firebase.firestore();
        const auth = firebase.auth();

        let roomId = "battle_room_1"; 
        let myRole = ""; 
        let gameWallet = 0; // Game එක ඇතුළේ සල්ලි
        let isGameActive = false;
        let targetColor = "";
        const ENTRY_FEE = 100;
        const ROUND_FEE = 15;

        // 1. මුලින්ම රු. 100ක් කපාගෙන Game Wallet එක පුරවා ගැනීම
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = fs.collection("users").doc(user.uid);
                const doc = await userRef.get();
                if (doc.exists) {
                    let totalBal = doc.data().balance || 0;
                    // Game එකට එද්දී මුළු balance එකෙන් 100ක් අඩු කරලා Wallet එකට දානවා
                    if (totalBal >= ENTRY_FEE && gameWallet === 0) {
                        await userRef.update({ balance: firebase.firestore.FieldValue.increment(-ENTRY_FEE) });
                        gameWallet = ENTRY_FEE;
                        updateUI();
                    } else if (gameWallet === 0) {
                        alert("සල්ලි මදි! Dashboard එකට යන්න.");
                        window.location.href = "dashboard.html";
                    }
                }
                joinRoom();
            } else { window.location.href = "index.html"; }
        });

        function joinRoom() {
            const roomRef = db.ref('rooms/' + roomId);
            roomRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data || !data.p1) { myRole = "p1"; roomRef.update({ p1: auth.currentUser.uid, p1_ready: false, winner: null }); }
                else if (!data.p2) { myRole = "p2"; roomRef.update({ p2: auth.currentUser.uid, p2_ready: false }); }
                document.getElementById('role-ui').innerText = myRole.toUpperCase();
            });

            // දිනුම් සල්ලි Listener එක
            db.ref('rooms/' + roomId + '/winner').on('value', (snapshot) => {
                if (snapshot.val() === myRole && !isGameActive) {
                    gameWallet += 30; // රු. 30ක් Game Wallet එකට එකතු වේ
                    db.ref('rooms/' + roomId + '/winner').set(null);
                    updateUI();
                    alert("ප්‍රතිවාදියා පරාදයි! ඔබට රු. 30ක් ලැබුණා.");
                }
            });
        }

        function startBet() {
            if(gameWallet < ROUND_FEE) return alert("Game Wallet එකේ සල්ලි මදි!");
            db.ref('rooms/' + roomId + '/' + myRole + '_ready').set(true);
            document.getElementById('btn-bet').innerText = "WAITING...";
            document.getElementById('btn-bet').disabled = true;

            db.ref('rooms/' + roomId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.p1_ready && data.p2_ready && !isGameActive) {
                    beginMatch();
                }
            });
        }

        function beginMatch() {
            isGameActive = true;
            gameWallet -= ROUND_FEE; // Wallet එකෙන් 15ක් කැපේ
            updateUI();
            document.getElementById('pot-ui').innerText = "Rs. 30";
            document.getElementById('btn-bet').innerText = "LIVE!";
            nextRound();
        }

        function nextRound() {
            if(!isGameActive) return;
            const colors = ["red", "blue", "green", "yellow", "purple", "white"];
            let txt = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            let el = document.getElementById('display-word');
            el.innerText = txt.toUpperCase();
            el.style.color = targetColor;
            startTimer();
        }

        let timer;
        function startTimer() {
            clearInterval(timer);
            let start = Date.now();
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let prog = Math.max(0, 100 - (diff / 1500 * 100));
                document.getElementById('timer-fill').style.width = prog + "%";
                if(diff >= 1500) endGame(false);
            }, 20);
        }

        function handleInput(choice) {
            if(!isGameActive) return;
            if(choice === targetColor) { nextRound(); } 
            else { endGame(false); }
        }

        async function endGame(win) {
            isGameActive = false;
            clearInterval(timer);
            if(win) {
                gameWallet += 30;
                updateUI();
                alert("ජයග්‍රහණය කළා!");
            } else {
                alert("ඔබ පරාදයි!");
                db.ref('rooms/' + roomId).update({ winner: (myRole === "p1" ? "p2" : "p1") });
            }
            db.ref('rooms/' + roomId).update({p1_ready: false, p2_ready: false});
            document.getElementById('btn-bet').innerText = "START BET (Rs. 15)";
            document.getElementById('btn-bet').disabled = false;
        }

        function updateUI() {
            document.getElementById('my-bal-ui').innerText = "Rs. " + gameWallet.toFixed(2);
        }

        // 2. ඉවත් වෙද්දී ඉතිරි මුදල නැවත Firestore එකට යැවීම
        async function cashOut() {
            if (gameWallet > 0) {
                const userRef = fs.collection("users").doc(auth.currentUser.uid);
                await userRef.update({ balance: firebase.firestore.FieldValue.increment(gameWallet) });
                alert("රු. " + gameWallet + " Dashboard එකට එකතු කළා.");
            }
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
