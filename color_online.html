<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vissa-Pro Battle Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .match-header { background: var(--card); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; }
        .p-info { text-align: center; }
        .p-name { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .p-bal { font-size: 18px; font-weight: bold; color: gold; }
        
        .pot-box { border: 2px solid var(--primary); padding: 8px 15px; border-radius: 25px; background: rgba(255, 71, 87, 0.1); }
        .pot-amount { font-size: 20px; font-weight: 900; color: var(--secondary); }

        .game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #display-word { font-size: 60px; font-weight: 900; margin-bottom: 30px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; }
        .color-btn { height: 85px; border: none; border-radius: 18px; box-shadow: 0 4px 0 #000; }

        .footer { position: fixed; bottom: 35px; width: 100%; display: flex; gap: 12px; padding: 0 20px; box-sizing: border-box; }
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: bold; color: white; text-transform: uppercase; font-size: 15px; }
    </style>
</head>
<body>

    <div class="match-header">
        <div class="p-info">
            <div id="my-name" class="p-name">ඔබ</div>
            <div id="my-bal" class="p-bal">Rs. 0</div>
        </div>
        <div class="pot-box">
            <span style="font-size: 10px; display: block; text-align: center;">POT</span>
            <span id="pot-ui" class="pot-amount">Rs. 0</span>
        </div>
        <div class="p-info">
            <div id="opp-name" class="p-name">ප්‍රතිවාදියා</div>
            <div id="opp-bal" class="p-bal">Rs. 0</div>
        </div>
    </div>

    <main class="game-zone">
        <div id="display-word">READY</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="checkAnswer('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="checkAnswer('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="checkAnswer('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="checkAnswer('yellow')"></button>
        </div>
    </main>

    <div class="footer">
        <button id="btn-bet" class="action-btn" style="background:var(--primary)" onclick="joinBattle()">START BET (Rs. 15)</button>
        <button class="action-btn" style="background:var(--secondary)" onclick="location.href='dashboard.html'">DASHBOARD</button>
    </div>

    <script>
        // Firebase Config (ඔයාගේ තොරතුරු මෙතනට දාන්න)
        const firebaseConfig = { /* CONFIG HERE */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let myUid, myRole, oppRole, roomId = "room_1";
        let myCurrentBal = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                myUid = user.uid;
                loadUserData();
            }
        });

        // 1. පරිශීලක දත්ත කියවීම (Dashboard එකේ Path එකට අනුව)
        function loadUserData() {
            db.ref('users/' + myUid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    myCurrentBal = data.balance || 0;
                    document.getElementById('my-name').innerText = data.userName || "ඔබ";
                    document.getElementById('my-bal').innerText = "Rs. " + myCurrentBal;
                }
            });
            setupRoom();
        }

        // 2. Room එකේ තොරතුරු Sync කිරීම
        function setupRoom() {
            const roomRef = db.ref('battles/' + roomId);
            
            roomRef.on('value', snap => {
                const room = snap.val();
                if (!room) return;

                // POT එක පෙන්වීම
                document.getElementById('pot-ui').innerText = "Rs. " + (room.pot || 0);

                // ප්‍රතිවාදියා සෙවීම
                if (!myRole) {
                    if (room.p1 === myUid) myRole = "p1";
                    else if (!room.p1) { myRole = "p1"; roomRef.update({ p1: myUid }); }
                    else { myRole = "p2"; roomRef.update({ p2: myUid }); }
                }

                oppRole = (myRole === "p1") ? "p2" : "p1";
                if (room[oppRole]) {
                    db.ref('users/' + room[oppRole]).once('value', s => {
                        document.getElementById('opp-name').innerText = s.val().userName;
                        document.getElementById('opp-bal').innerText = "Rs. " + s.val().balance;
                    });
                }
            });
        }

        // 3. Bet එක එබූ විට මුදල් අඩු කිරීම
        function joinBattle() {
            if (myCurrentBal < 15) return alert("සල්ලි මදි!");

            const roomRef = db.ref('battles/' + roomId);
            // සල්ලි අඩු කිරීම
            db.ref('users/' + myUid).update({ balance: myCurrentBal - 15 });
            
            // Ready බව සලකුණු කිරීම සහ POT එක වැඩි කිරීම
            roomRef.child(myRole + '_ready').set(true);
            roomRef.child('pot').transaction(currentPot => (currentPot || 0) + 15);

            document.getElementById('btn-bet').disabled = true;
            document.getElementById('btn-bet').innerText = "WAITING...";
        }

        // 4. ජයග්‍රහණය කළ විට (Winner Logic)
        function winGame(winnerUid, amount) {
            db.ref('users/' + winnerUid).transaction(data => {
                if (data) data.balance = (data.balance || 0) + amount;
                return data;
            });
            alert("ඔබ ජයග්‍රහණය කළා! රු. " + amount + " ලැබුණා.");
            db.ref('battles/' + roomId).remove(); // Room එක Reset කිරීම
            location.reload();
        }
    </script>
</body>
</html>
