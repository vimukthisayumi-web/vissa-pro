<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Battle Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #050510; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .match-header { background: var(--card); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid gold; }
        .p-balance { font-size: 18px; font-weight: bold; color: gold; }
        #timer-wrap { width: 100%; height: 6px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }
        .game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; }
        #display-word { font-size: 60px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .color-btn { height: 85px; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #000; }
        .footer { position: fixed; bottom: 20px; left: 0; right: 0; background: var(--card); padding: 15px; display: flex; gap: 10px; margin: 0 15px; border-radius: 15px; border: 1px solid #333; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="match-header">
        <div style="text-align:center">
            <div style="font-size:10px; color:#aaa;">ඔබ (<span id="role-ui">...</span>)</div>
            <div id="my-bal-ui" class="p-balance">Rs. 0</div>
        </div>
        <div style="color:var(--secondary); font-weight:bold; border: 1.1px solid gold; padding: 5px 15px; border-radius: 20px;">
            POT: <span id="pot-ui">Rs. 0</span>
        </div>
        <div style="text-align:center">
            <div style="font-size:10px; color:#aaa;">ප්‍රතිවාදියා</div>
            <div id="opp-status-ui" class="p-balance">WAITING</div>
        </div>
    </div>

    <div id="timer-wrap"><div id="timer-fill"></div></div>

    <main class="game-zone">
        <div id="display-word">READY?</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="handleInput('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="handleInput('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="handleInput('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="handleInput('yellow')"></button>
        </div>
    </main>

    <footer class="footer">
        <button id="btn-bet" class="action-btn" style="background:var(--primary)" onclick="startBet()">JOIN MATCH</button>
        <button class="action-btn" style="background:#444" onclick="exitGame()">EXIT</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const fs = firebase.firestore();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || "default_room";
        let entryFee = parseInt(urlParams.get('price')) || 100;

        let myRole = ""; 
        let gameWallet = 0; 
        let isGameActive = false;
        let targetColor = "";
        let timer;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = fs.collection("users").doc(user.uid);
                const doc = await userRef.get();
                if (doc.exists && gameWallet === 0) {
                    gameWallet = entryFee; // Dashboard එකෙන් දැනටමත් සල්ලි කැපී ඇති බව උපකල්පනය කෙරේ
                    updateUI();
                }
                joinBattleRoom();
            } else { window.location.href = "index.html"; }
        });

        function joinBattleRoom() {
            const roomRef = db.ref('rooms/' + roomId);
            roomRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data || !data.p1) { myRole = "p1"; roomRef.update({ p1: auth.currentUser.uid, p1_ready: false, winner: null }); }
                else if (!data.p2) { myRole = "p2"; roomRef.update({ p2: auth.currentUser.uid, p2_ready: false }); }
                else { alert("Room Full!"); return; }
                document.getElementById('role-ui').innerText = myRole.toUpperCase();
            });

            // දෙන්නාම Ready ද කියා බැලීමට Listener එකක්
            db.ref('rooms/' + roomId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // ප්‍රතිවාදියාගේ තත්ත්වය යාවත්කාලීන කිරීම
                let oppRole = (myRole === "p1") ? "p2" : "p1";
                if (data[oppRole]) {
                    document.getElementById('opp-status-ui').innerText = data[oppRole + '_ready'] ? "READY" : "JOINED";
                }

                // දෙන්නාම Ready නම් Game එක පටන් ගන්න
                if (data.p1_ready && data.p2_ready && !isGameActive) {
                    beginMatch();
                }

                // ජයග්‍රාහකයා පරීක්ෂා කිරීම (ප්‍රතිවාදියා පැරදුනොත් මට සල්ලි ලැබීම)
                if (data.winner === myRole && !isGameActive) {
                    gameWallet += (entryFee * 1.8); // ජයග්‍රාහී මුදල
                    db.ref('rooms/' + roomId + '/winner').set(null);
                    updateUI();
                    alert("ප්‍රතිවාදියා පරාදයි! ඔබ ජයග්‍රහණය කළා.");
                }
            });
        }

        function startBet() {
            db.ref('rooms/' + roomId + '/' + myRole + '_ready').set(true);
            document.getElementById('btn-bet').innerText = "WAITING...";
            document.getElementById('btn-bet').disabled = true;
        }

        function beginMatch() {
            isGameActive = true;
            document.getElementById('pot-ui').innerText = "Rs. " + (entryFee * 2);
            document.getElementById('btn-bet').innerText = "PLAYING";
            nextRound();
        }

        function nextRound() {
            if(!isGameActive) return;
            const colors = ["red", "blue", "green", "yellow"];
            let txt = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            let el = document.getElementById('display-word');
            el.innerText = txt.toUpperCase();
            el.style.color = targetColor;
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            let start = Date.now();
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let prog = Math.max(0, 100 - (diff / 1500 * 100)); // තත්පර 1.5 කාලය
                document.getElementById('timer-fill').style.width = prog + "%";
                if(diff >= 1500) endGame(false);
            }, 20);
        }

        function handleInput(choice) {
            if(!isGameActive) return;
            if(choice === targetColor) { nextRound(); } 
            else { endGame(false); }
        }

        function endGame(win) {
            isGameActive = false;
            clearInterval(timer);
            if(!win) {
                alert("ඔබ පරාදයි!");
                // පරාද වූ විට අනිත් කෙනා winner ලෙස සලකුණු කරයි
                db.ref('rooms/' + roomId).update({ 
                    winner: (myRole === "p1" ? "p2" : "p1"),
                    p1_ready: false, 
                    p2_ready: false 
                });
                gameWallet = 0; // පරාද වූ නිසා wallet එක හිස් වේ
                updateUI();
            }
            document.getElementById('btn-bet').innerText = "JOIN MATCH";
            document.getElementById('btn-bet').disabled = false;
        }

        function updateUI() {
            document.getElementById('my-bal-ui').innerText = "Rs. " + gameWallet.toFixed(0);
        }

        async function exitGame() {
            if (gameWallet > 0) {
                const userRef = fs.collection("users").doc(auth.currentUser.uid);
                await userRef.update({ balance: firebase.firestore.FieldValue.increment(gameWallet) });
            }
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
