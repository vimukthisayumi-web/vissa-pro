<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Deposit - VISSA PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: gold; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>මුදල් තැන්පත් කරන්න (Deposit)</h2>
    <input type="number" id="deposit-amount" placeholder="මුදල (LKR)">
    <input type="text" id="ref-number" placeholder="Reference Number (අංකය)">
    <button onclick="submitDeposit()">යොමු කරන්න</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script>
        const firebaseConfig = { /* ඔයාගේ කලින් තිබුණු Config එක මෙතනට අනිවාර්යයෙන්ම දාන්න */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function submitDeposit() {
            const user = firebase.auth().currentUser;
            const amountVal = document.getElementById('deposit-amount').value;
            const refNum = document.getElementById('ref-number').value;

            if (user && amountVal && refNum) {
                db.collection("deposits").add({
                    uid: user.uid,
                    userName: user.displayName || "Gamer",
                    amount: parseFloat(amountVal),
                    reference: refNum,
                    status: "pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    alert("විස්තර යොමු කළා! Admin පරීක්ෂා කර සල්ලි එකතු කරනු ඇත.");
                    window.location.href = "dashboard.html";
                });
            } else { alert("කරුණාකර විස්තර පුරවන්න."); }
        }
    </script>
</body>
</html>
