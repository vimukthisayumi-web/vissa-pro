<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - VISSA PRO</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #08051a; 
            color: white; 
            padding: 20px; 
            text-align: center;
        }
        h2 { margin-bottom: 30px; color: #fff; }
        .method { 
            background: #1a1a4f; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid gold; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            transition: 0.3s;
        }
        .method:hover { background: #252563; }
        .back-btn { 
            color: gold; 
            cursor: pointer; 
            margin-bottom: 20px; 
            display: block; 
            text-align: left;
            text-decoration: none;
            font-size: 14px;
        }
        button {
            background: gold;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <a href="wallet.html" class="back-btn">❮ ආපසු පසුම්බියට</a>
    
    <h2>මුදල් ඇතුළත් කරන්න</h2>
    
    <div class="method">
        <span>💰 eZ Cash</span>
        <button onclick="alert('eZ Cash සේවාව ළඟදීම බලාපොරොත්තු වන්න!')">තෝරන්න</button>
    </div>

    <div class="method">
        <span>📱 mCash</span>
        <button onclick="alert('mCash සේවාව ළඟදීම බලාපොරොත්තු වන්න!')">තෝරන්න</button>
    </div>

    <div class="method">
        <span>🏦 Bank Transfer</span>
        <button onclick="window.location.href='bank_deposit.html'">තෝරන්න</button>
    </div>

</body>
</html>
