<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Deposit - VISSA PRO</title>
    <style>
        body { font-family: sans-serif; background: #08051a; color: white; padding: 20px; }
        .method { background: #1a1a4f; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid gold; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: gold; cursor: pointer; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <span class="back-btn" onclick="window.location.href='wallet.html'">❮ ආපසු පසුම්බියට</span>
    <h2>මුදල් ඇතුළත් කරන්න</h2>
    
    <div class="method">
        <span>💰 eZ Cash</span>
        <button onclick="alert('eZ Cash අංකය: 077xxxxxxx')">තෝරන්න</button>
    </div>
    <div class="method">
        <span>📱 mCash</span>
        <button onclick="alert('mCash අංකය: 071xxxxxxx')">තෝරන්න</button>
    </div>
    <div class="method">
        <span>🏦 Bank Transfer</span>
        <button onclick="alert('බැංකු ගිණුම් විස්තර ලබාගන්න')">තෝරන්න</button>
    </div>
</body>
</html>
