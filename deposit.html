<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - VISSA PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .bank-card { background: linear-gradient(45deg, #1a1a4f, #0d0d2b); padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(255,215,0,0.2); }
        .bank-title { color: gold; font-weight: bold; margin-bottom: 10px; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .detail-row { margin: 8px 0; font-size: 14px; }
        .label { color: #aaa; width: 100px; display: inline-block; }
        .value { color: #fff; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: gold; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">මුදල් තැන්පත් කරන්න</h2>
    
    <div class="bank-card">
        <div class="bank-title">🏦 අපගේ බැංකු විස්තර</div>
        <div class="detail-row"><span class="label">Bank:</span> <span class="value">COMMERCIAL BANK</span></div>
        <div class="detail-row"><span class="label">Acc Name:</span> <span class="value">I P VIMUKTHI THUHINA WIJERATHNA</span></div>
        <div class="detail-row"><span class="label">Acc Number:</span> <span class="value">8028840493</span></div>
        <div class="detail-row"><span class="label">Branch:</span> <span class="value">Veyangoda</span></div>
        <p style="font-size: 11px; color: #ffeb3b; margin-top: 10px;">* සල්ලි දැමීමෙන් පසු රිසිට් පතේ අංකය (Ref Number) පහත ඇතුළත් කරන්න.</p>
    </div>

    <div class="input-form">
        <label>තැන්පත් කළ මුදල (Amount)</label>
        <input type="number" id="deposit-amount" placeholder="LKR 500">
        
        <label>රිසිට් පතේ අංකය (Reference Number)</label>
        <input type="text" id="ref-number" placeholder="Eg: 123456789">
        
        <button id="submitBtn" onclick="submitDeposit()">Submit Request</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966",
            measurementId: "G-KCKJLGX5J5"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUserID = null;

        // යූසර් ලොග් වෙලා ඉන්නවද කියලා පරීක්ෂා කිරීම
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserID = user.uid;
                console.log("Logged in as:", user.uid);
            } else {
                alert("කරුණාකර පළමුව ලොග් වන්න!");
                window.location.href = "index.html";
            }
        });

        async function submitDeposit() {
            const amountVal = document.getElementById('deposit-amount').value;
            const refNum = document.getElementById('ref-number').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!currentUserID) {
                alert("පරිශීලක හඳුනාගැනීමේ දෝෂයකි. නැවත ලොග් වන්න.");
                return;
            }

            if (amountVal && refNum) {
                // බටන් එක Disable කරනවා දෙපාරක් එබීම වැලැක්වීමට
                submitBtn.disabled = true;
                submitBtn.innerText = "Processing...";

                try {
                    await db.collection("deposits").add({
                        uid: currentUserID,
                        amount: parseFloat(amountVal),
                        reference: refNum,
                        status: "pending",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert("විස්තර සාර්ථකව යොමු කළා! ✅\nAdmin පරීක්ෂා කර සල්ලි එකතු කරනු ඇත.");
                    window.location.href = "dashboard.html";

                } catch (error) {
                    console.error("Error adding document: ", error);
                    alert("දත්ත යැවීමේදී දෝෂයක් සිදු විය: " + error.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Request";
                }
            } else {
                alert("කරුණාකර සියලු විස්තර නිවැරදිව පුරවන්න.");
            }
        }
    </script>
</body>
</html>
