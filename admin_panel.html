<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .request-card { background: #1a1a4f; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .approve-btn { background: #28a745; color: white; }
        .reject-btn { background: #dc3545; color: white; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; float: right; }
    </style>
</head>
<body>

    <h2>Admin - Deposit Requests</h2>
    <hr>
    <div id="requests-list">Loading requests...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase Config (ඔබේ Config එක දාන්න)
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            // ... අනෙක් ටික
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Pending තියෙන සියලුම Deposit Requests මෙතනට ගන්නවා
        function loadRequests() {
            db.collection("deposits").where("status", "==", "pending")
            .onSnapshot((snapshot) => {
                const listDiv = document.getElementById('requests-list');
                listDiv.innerHTML = "";

                if (snapshot.empty) {
                    listDiv.innerHTML = "අලුත් ඉල්ලීම් කිසිවක් නැත.";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = `
                        <div class="request-card">
                            <span class="status-badge" style="background:orange;">PENDING</span>
                            <div><b>User:</b> ${data.userName || 'Unknown'}</div>
                            <div><b>Amount:</b> LKR ${data.amount}</div>
                            <div><b>Ref:</b> ${data.reference}</div>
                            <div style="font-size:10px; color:#aaa;">UID: ${data.uid}</div>
                            <br>
                            <button class="btn approve-btn" onclick="approveDeposit('${doc.id}', '${data.uid}', ${data.amount})">Approve ✅</button>
                            <button class="btn reject-btn" onclick="rejectDeposit('${doc.id}')">Reject ❌</button>
                        </div>
                    `;
                    listDiv.innerHTML += card;
                });
            });
        }

        // 1. බොත්තම එබූ විට සල්ලි එකතු වන හැටි (The Magic Button)
        async function approveDeposit(docId, userId, amount) {
            if(confirm("මෙම මුදල පරිශීලකයාගේ ගිණුමට එකතු කිරීමට අවශ්‍යද?")) {
                try {
                    const userRef = db.collection("users").doc(userId);
                    
                    // Transaction එකක් භාවිතා කර සල්ලි එකතු කිරීම
                    await db.runTransaction(async (transaction) => {
                        const userDoc = await transaction.get(userRef);
                        
                        let newBalance = amount;
                        if (userDoc.exists && userDoc.data().balance) {
                            newBalance = userDoc.data().balance + amount;
                        }

                        // 1. User ගේ balance එක අප්ඩේට් කරනවා
                        transaction.update(userRef, { balance: newBalance });

                        // 2. Deposit Request එක 'completed' කරනවා
                        transaction.update(db.collection("deposits").doc(docId), { status: "completed" });
                    });

                    alert("මුදල් සාර්ථකව එකතු කළා! ✅");
                } catch (e) {
                    alert("දෝෂයක්: " + e.message);
                }
            }
        }

        function rejectDeposit(docId) {
            if(confirm("මෙම ඉල්ලීම ප්‍රතික්ෂේප කරන්නද?")) {
                db.collection("deposits").doc(docId).update({ status: "rejected" });
            }
        }

        loadRequests();
    </script>
</body>
</html>
