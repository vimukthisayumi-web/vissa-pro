<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - VISSA PRO</title>
    <style>
        body { font-family: sans-serif; background: #08051a; color: white; margin: 0; padding: 20px; padding-bottom: 80px; }
        .noti-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid #0cf; }
        .noti-title { font-size: 15px; font-weight: bold; color: gold; }
        .noti-desc { font-size: 13px; color: #ccc; margin-top: 5px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #100a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: gold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">දැනුම්දීම්</h2>

    <div class="noti-card">
        <div class="noti-title">Welcome Bonus! 🎁</div>
        <div class="noti-desc">ඔබේ ගිණුමට Bonus මුදලක් එකතු විය.</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><span class="nav-icon">🏠</span>මුල් පිටුව</div>
        <div class="nav-item" onclick="window.location.href='wallet.html'"><span class="nav-icon">👜</span>පසුම්බිය</div>
        <div class="nav-item" onclick="window.location.href='events.html'"><span class="nav-icon">🏆</span>සිදුවීම්</div>
        <div class="nav-item active" onclick="window.location.href='notifications.html'"><span class="nav-icon">🔔</span>දැනුම්දීම්</div>
        <div class="nav-item" onclick="window.location.href='profile.html'"><span class="nav-icon">👤</span>පැතිකඩ</div>
    </div>
</body>
</html>
