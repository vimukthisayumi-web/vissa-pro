<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; background: orange; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid gold; }
        .wallet { background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid gold; cursor: pointer; }

        /* Game Card */
        .game-card { background: #1a1a4f; border-radius: 25px; margin: 15px; height: 200px; border: 3px solid gold; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; }
        .play-btn { background: linear-gradient(45deg, #ffcc00, #ff6600); border: none; padding: 12px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #100a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: gold; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a4f; margin: 20% auto; padding: 20px; border-radius: 20px; text-align: center; width: 80%; border: 1px solid gold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar">V</div>
            <div>
                <div id="user-name" style="font-weight:bold;">Loading...</div>
                <div id="user-uid" style="font-size: 10px; color: gold;">UID: Loading...</div>
            </div>
        </div>
        <div class="wallet" onclick="goToPage('wallet.html')">LKR <span id="user-balance">0</span></div>
    </div>

    <div class="game-card">
        <div style="font-weight:bold; margin-bottom: 10px;">CARROM POOL PRO</div>
        <button class="play-btn" onclick="showModal('modeModal')">PLAY NOW</button>
    </div>

    <div id="modeModal" class="modal">
        <div class="modal-content">
            <h3 style="color:gold;">SELECT MODE</h3>
            <button onclick="startMatching(100)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px;">PLAY ONLINE (LKR 100)</button>
            <button onclick="closeModal('modeModal')" style="background:none; border:none; color:white;">CANCEL</button>
        </div>
    </div>

    <div id="waitingModal" class="modal">
        <div class="modal-content">
            <h3 style="color:gold;">MATCHING...</h3>
            <p>තරඟකරුවෙකු සොයමින්...</p>
            <button onclick="cancelMatching()" style="background:red; color:white; border:none; padding:10px 20px; border-radius:10px;">CANCEL</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="goToPage('dashboard.html')">🏠<br>මුල් පිටුව</div>
        <div class="nav-item" onclick="goToPage('wallet.html')">👜<br>පසුම්බිය</div>
        <div class="nav-item" onclick="goToPage('events.html')">🏆<br>සිදුවීම්</div>
        <div class="nav-item" onclick="goToPage('notifications.html')">🔔<br>දැනුම්දීම්</div>
        <div class="nav-item" onclick="goToPage('profile.html')">👤<br>පැතිකඩ</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966",
            measurementId: "G-KCKJLGX5J5"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let myUid = '';

        auth.onAuthStateChanged(user => {
            if (user) {
                myUid = user.uid;
                document.getElementById('user-uid').innerText = "UID: " + myUid.substring(0,8);
                db.collection("users").doc(myUid).onSnapshot(doc => {
                    if (doc.exists) {
                        document.getElementById('user-name').innerText = doc.data().username;
                        document.getElementById('user-balance').innerText = doc.data().balance;
                    }
                });
            }
        });

        async function startMatching(fee) {
            closeModal('modeModal');
            showModal('waitingModal');
            
            // Add user to waiting list
            await db.collection("waiting_players").doc(myUid).set({
                uid: myUid,
                fee: fee,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Listen for opponent
            db.collection("active_matches").doc(myUid).onSnapshot(doc => {
                if(doc.exists) window.location.href = "carrom_online.html?matchId=" + myUid;
            });
        }

        function cancelMatching() {
            db.collection("waiting_players").doc(myUid).delete();
            closeModal('waitingModal');
        }

        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function goToPage(p) { window.location.href = p; }
    </script>
</body>
</html>
