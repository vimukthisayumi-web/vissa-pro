<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050510; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header & Balance */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; background: orange; border-radius: 50%; border: 2px solid gold; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #user-uid { font-size: 10px; color: gold; cursor: pointer; display: block; margin-top: 2px; }
        .wallet { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid gold; display: flex; align-items: center; gap: 5px; }
        .plus-icon { background: #008000; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }

        /* Play Now Card */
        .main-card { background: url('https://play-movies.googleusercontent.com/vx_S_0QYJ5bK_g950vEa4vO0G5gL6yP2E8wGk8D0A5T5n0Y1vJg5N3e5N2wD2Q') center; background-size: cover; height: 200px; margin: 15px; border-radius: 20px; border: 2px solid gold; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 15px; box-shadow: 0 0 15px gold; }
        .btn-play-main { background: linear-gradient(45deg, #ffcc00, #ff6600); border: none; padding: 10px 40px; border-radius: 25px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #0d0d2b; border: 2px solid #ffcc00; width: 85%; margin: 25% auto; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 0 20px #ffcc00; }

        /* Mode Selection Buttons (Screenshot 1 වගේ) */
        .mode-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; font-weight: bold; font-size: 16px; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .online-btn { background: #007bff; color: white; }
        .practice-btn { background: #8bc34a; color: white; }

        /* Room Slider (Screenshot 2 වගේ) */
        .room-container { display: flex; overflow-x: auto; gap: 15px; padding: 15px 0; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .room-card { min-width: 85%; background: rgba(255,255,255,0.05); border: 1.5px solid gold; border-radius: 15px; padding: 20px; scroll-snap-align: center; position: relative; }
        .room-title { color: gold; font-weight: bold; font-size: 14px; }
        .room-price { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .room-win { color: #00ffcc; font-size: 14px; margin-bottom: 15px; }
        .btn-join { background: #ffcc00; color: black; border: none; padding: 10px 40px; border-radius: 10px; font-weight: bold; width: 100%; }

        /* Matching Screen (Screenshot 3 වගේ) */
        .match-bg { background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6vG8lUv-v4_P6Qz9_H5B_2Hq_L2Y7p5J6XQ&s') center; background-size: cover; }
        .matching-box { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; }
        .player-profile { width: 80px; text-align: center; }
        .p-img { width: 70px; height: 70px; border: 2px solid white; border-radius: 15px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .vs-circle { width: 50px; height: 50px; background: gold; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; }
        .nav-item.active { color: #ffcc00; }
        .nav-icon { font-size: 20px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar">V</div>
            <div>
                <div id="user-name" style="font-weight:bold;">Player</div>
                <div id="user-uid" onclick="copyUID()">UID: Loading...</div>
            </div>
        </div>
        <div class="wallet" onclick="goToPage('wallet.html')">
            <span style="color: gold; font-weight: bold;">LKR <span id="user-balance">0</span></span>
            <div class="plus-icon">+</div>
        </div>
    </div>

    <div class="main-card">
        <button class="btn-play-main" onclick="showModal('modeModal')">PLAY NOW</button>
    </div>

    <div id="modeModal" class="modal">
        <div class="modal-content">
            <h2 style="color:gold; font-size: 18px; margin-bottom: 20px;">SELECT MODE</h2>
            <button class="mode-btn online-btn" onclick="openRooms()">🌐 PLAY ONLINE</button>
            <button class="mode-btn practice-btn" onclick="goToPage('practice.html')">🎓 FREE PRACTICE</button>
            <div style="margin-top: 15px; color: #aaa; cursor: pointer;" onclick="closeModal('modeModal')">CANCEL</div>
        </div>
    </div>

    <div id="roomModal" class="modal">
        <div class="modal-content" style="width: 90%;">
            <h2 style="color:gold; font-size: 18px;">CHOOSE A ROOM</h2>
            <div class="room-container">
                <div class="room-card">
                    <div class="room-title">Starter Room</div>
                    <div class="room-price">LKR 100</div>
                    <div class="room-win">Win: LKR 180</div>
                    <button class="btn-join" onclick="startMatchmaking(100)">JOIN</button>
                </div>
                <div class="room-card">
                    <div class="room-title">Pro Room</div>
                    <div class="room-price">LKR 300</div>
                    <div class="room-win">Win: LKR 540</div>
                    <button class="btn-join" onclick="startMatchmaking(300)">JOIN</button>
                </div>
                <div class="room-card">
                    <div class="room-title">Master Room</div>
                    <div class="room-price">LKR 500</div>
                    <div class="room-win">Win: LKR 900</div>
                    <button class="btn-join" onclick="startMatchmaking(500)">JOIN</button>
                </div>
            </div>
            <div style="margin-top: 15px; color: #aaa; cursor: pointer;" onclick="closeModal('roomModal')">BACK</div>
        </div>
    </div>

    <div id="waitingModal" class="modal match-bg">
        <div class="modal-content" style="background: rgba(0,0,0,0.8); border:none;">
            <div style="color: gold; font-weight: bold; margin-bottom: 10px;">MATCHING...</div>
            <div class="matching-box">
                <div class="player-profile">
                    <div class="p-img">👤</div>
                    <div style="font-size: 12px; margin-top: 5px;" id="p1-name">YOU</div>
                </div>
                <div class="vs-circle">VS</div>
                <div class="player-profile">
                    <div class="p-img" style="border-style: dashed; opacity: 0.5;">?</div>
                    <div style="font-size: 12px; margin-top: 5px; color: #888;">Searching...</div>
                </div>
            </div>
            <div style="margin-top: 30px;">
                <button onclick="cancelMatch()" style="background:none; border:1px solid red; color:red; padding:8px 20px; border-radius:10px;">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>මුල් පිටුව
        </div>
        <div class="nav-item" onclick="goToPage('wallet.html')">
            <span class="nav-icon">👜</span>පසුම්බිය
        </div>
        <div class="nav-item">
            <span class="nav-icon">🏆</span>සිදුවීම්
        </div>
        <div class="nav-item">
            <span class="nav-icon">🔔</span>දැනුම්දීම්
        </div>
        <div class="nav-item" onclick="goToPage('profile.html')">
            <span class="nav-icon">👤</span>පැතිකඩ
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966",
            measurementId: "G-KCKJLGX5J5"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let myData = { uid: '', name: '', balance: 0 };

        auth.onAuthStateChanged(user => {
            if (user) {
                myData.uid = user.uid;
                document.getElementById('user-uid').innerText = "UID: " + user.uid.substring(0,10) + "...";
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        myData.name = doc.data().username;
                        myData.balance = doc.data().balance;
                        document.getElementById('user-name').innerText = myData.name;
                        document.getElementById('p1-name').innerText = myData.name;
                        document.getElementById('user-balance').innerText = myData.balance;
                    }
                });
            }
        });

        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function openRooms() {
            closeModal('modeModal');
            showModal('roomModal');
        }

        async function startMatchmaking(fee) {
            if (myData.balance < fee) {
                alert("ප්‍රමාණවත් මුදල් නොමැත! සේවා ගාස්තුව සමඟ රු. " + (fee + 10) + " ක් අවශ්‍යයි.");
                return;
            }
            closeModal('roomModal');
            showModal('waitingModal');
            
            // Firebase Logic
            await db.collection("waiting_players").doc(myData.uid).set({
                uid: myData.uid, name: myData.name, fee: fee, time: Date.now()
            });

            db.collection("active_matches").doc(myData.uid).onSnapshot(doc => {
                if (doc.exists) window.location.href = "carrom_online.html?matchId=" + myData.uid;
            });
        }

        function cancelMatch() {
            db.collection("waiting_players").doc(myData.uid).delete();
            closeModal('waitingModal');
        }

        function copyUID() {
            navigator.clipboard.writeText(auth.currentUser.uid);
            alert("UID Copied!");
        }

        function goToPage(url) { window.location.href = url; }
    </script>
</body>
</html>
