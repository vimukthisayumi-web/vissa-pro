<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050510; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .avatar { width: 45px; height: 45px; background: orange; border-radius: 50%; border: 2px solid gold; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .wallet { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid gold; cursor: pointer; }
        .main-card { background: #0d0d2b; height: 200px; margin: 15px; border-radius: 20px; border: 2px solid gold; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-play-main { background: linear-gradient(45deg, #ffcc00, #ff6600); border: none; padding: 12px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="avatar" id="nav-avatar">?</div>
            <div>
                <div id="user-name" style="font-weight:bold;">Loading...</div>
                <div id="user-uid" style="font-size: 10px; color: gold;">UID: Loading...</div>
            </div>
        </div>
        <div class="wallet" onclick="window.location.href='wallet.html'">
            <span style="color: gold; font-weight: bold;">LKR <span id="user-balance">0.00</span></span>
        </div>
    </div>

    <div class="main-card">
        <h2 style="color:white;">WELCOME TO VISSA</h2>
        <button class="btn-play-main" onclick="window.location.href='game.html'">PLAY NOW</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠<br>Home</div>
        <div class="nav-item" onclick="window.location.href='wallet.html'">👜<br>Wallet</div>
        <div class="nav-item" onclick="window.location.href='events.html'">🏆<br>Events</div>
        <div class="nav-item" onclick="window.location.href='profile.html'">👤<br>Profile</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('user-name').innerText = data.username || "Player";
                        document.getElementById('user-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
                        document.getElementById('nav-avatar').innerText = (data.username || "P").charAt(0).toUpperCase();
                        document.getElementById('user-uid').innerText = "UID: " + user.uid.substring(0,10);
                    } else {
                        // 🚀 මෙන්න මේ ටිකෙන් තමයි අලුත් කෙනෙක් ආවම UID එකත් එක්කම Save වෙන්නේ
                        userRef.set({
                            uid: user.uid, 
                            username: "Player_" + Math.floor(Math.random() * 1000),
                            balance: 0,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
