<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - VISSA PRO</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); 
            color: white; 
            margin: 0; padding: 20px; padding-bottom: 100px;
            text-align: center; 
        }
        .profile-container { position: relative; width: 100px; height: 100px; margin: 20px auto; }
        .profile-img { 
            width: 100px; height: 100px; 
            border-radius: 50%; border: 4px solid gold; 
            box-shadow: 0 0 15px gold; object-fit: cover;
        }
        h3 { margin-top: 10px; margin-bottom: 5px; color: gold; }
        
        .uid-box {
            background: rgba(255, 217, 0, 0.1);
            color: #ccc;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            cursor: pointer;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 217, 0, 0.3);
        }

        .info-container { text-align: left; max-width: 400px; margin: 0 auto; }
        .info-box { 
            background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 15px; margin-bottom: 12px; border-left: 4px solid #0cf;
        }
        .label { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 15px; font-weight: bold; word-wrap: break-word; color: #fff; }
        
        .edit-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .save-btn {
            background: #0cf; color: black; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%;
        }
        .locked-msg { color: #00ff00; font-size: 12px; font-weight: bold; margin-top: 5px; display: none; }

        .logout-btn { 
            background: linear-gradient(45deg, #ff4444, #8b0000); 
            color: white; border: none; padding: 15px; width: 100%; max-width: 400px;
            border-radius: 15px; margin-top: 30px; font-weight: bold;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; 
            background: #100a2e; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; text-decoration: none; }
        .nav-item.active { color: gold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <h2>මගේ පැතිකඩ</h2>

    <div class="profile-container">
        <img id="user-photo" class="profile-img" src="https://via.placeholder.com/100" alt="Profile">
    </div>
    
    <h3 id="display-name">Loading...</h3>
    <p style="color: #0cf; font-size: 12px; margin-bottom: 5px;">VISSA PRO Member</p>
    
    <div class="uid-box" onclick="copyUID()">
        UID: <span id="user-uid">Loading...</span> 📋
    </div>

    <div class="info-container">
        
        <div class="info-box">
            <div class="label">පරිශීලක නාමය</div>
            <div id="name-view" style="display: none;" class="value"></div>
            <div id="name-edit-section">
                <input type="text" id="name-input" class="edit-input" placeholder="ඔබේ නම ඇතුළත් කරන්න">
                <button id="save-name-btn" class="save-btn" onclick="updateProfileName()">Update Name</button>
            </div>
            <div id="locked-msg" class="locked-msg">✓ නම තහවුරු කර ඇත</div>
        </div>

        <div class="info-box">
            <div class="label">ඊමේල් ලිපිනය</div>
            <div id="user-email" class="value">Loading...</div>
        </div>

        <div class="info-box">
            <div class="label">දුරකථන අංකය</div>
            <div id="phone-display" class="value">සම්බන්ධ කර නැත</div>
        </div>

    </div>

    <div id="recaptcha-container"></div>
    <button class="logout-btn" onclick="logoutUser()">LOGOUT</button>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>මුල් පිටුව</a>
        <a href="wallet.html" class="nav-item"><span class="nav-icon">👜</span>පසුම්බිය</a>
        <a href="events.html" class="nav-item"><span class="nav-icon">🏆</span>සිදුවීම්</a>
        <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span>දැනුම්දීම්</a>
        <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span>පැතිකඩ</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966",
            measurementId: "G-KCKJLGX5J5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-uid').innerText = user.uid;
                if (user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                if (user.phoneNumber) document.getElementById('phone-display').innerText = user.phoneNumber;

                // Firestore එකෙන් නම තියෙනවාද බලන්න
                db.collection("users").doc(user.uid).get().then((doc) => {
                    if (doc.exists && doc.data().userName) {
                        // නම තියෙනවා නම් Edit Section එක අයින් කරන්න
                        document.getElementById('display-name').innerText = doc.data().userName;
                        document.getElementById('name-view').innerText = doc.data().userName;
                        document.getElementById('name-view').style.display = 'block';
                        document.getElementById('name-edit-section').style.display = 'none';
                        document.getElementById('locked-msg').style.display = 'block';
                    } else {
                        document.getElementById('display-name').innerText = "නමක් ඇතුළත් කරන්න";
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        function updateProfileName() {
            const newName = document.getElementById('name-input').value;
            const user = auth.currentUser;

            if (newName.trim().length < 3) {
                alert("කරුණාකර අවම අකුරු 3ක නමක් ඇතුළත් කරන්න.");
                return;
            }

            db.collection("users").doc(user.uid).get().then((doc) => {
                if (doc.exists && doc.data().userName) {
                    alert("ඔබ දැනටමත් නමක් ඇතුළත් කර ඇත!");
                } else {
                    // Update Auth and Firestore
                    user.updateProfile({ displayName: newName }).then(() => {
                        return db.collection("users").doc(user.uid).set({
                            userName: newName,
                            email: user.email,
                            uid: user.uid
                        }, { merge: true });
                    }).then(() => {
                        alert("සාර්ථකයි! නම තහවුරු වුණා.");
                        location.reload();
                    }).catch((err) => alert("Error: " + err.message));
                }
            });
        }

        function copyUID() {
            const uidText = document.getElementById('user-uid').innerText;
            navigator.clipboard.writeText(uidText).then(() => {
                alert("UID එක Copy වුණා!");
            });
        }

        function logoutUser() {
            auth.signOut().then(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
