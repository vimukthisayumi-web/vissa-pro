<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - VISSA PRO</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); 
            color: white; 
            margin: 0; padding: 20px; padding-bottom: 100px;
            text-align: center; 
        }
        .profile-img { 
            width: 100px; height: 100px; 
            border-radius: 50%; border: 4px solid gold; 
            box-shadow: 0 0 15px gold; object-fit: cover;
            margin-bottom: 10px;
        }
        #uid-display {
            color: gold; font-size: 11px; cursor: pointer;
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 12px; border-radius: 8px;
            border: 1px dashed gold; display: inline-block; margin-top: 5px;
        }
        .info-box { 
            background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 15px; margin-bottom: 12px; border-left: 4px solid #0cf;
            text-align: left;
        }
        .label { font-size: 11px; color: #aaa; text-transform: uppercase; }
        .value { font-size: 15px; font-weight: bold; margin-top: 3px; }
        input { background: rgba(255,255,255,0.1); color: white; border: 1px solid #555; padding: 12px; border-radius: 10px; width: 90%; margin-top: 8px; }
        .save-btn { background: gold; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .logout-btn { 
            background: linear-gradient(45deg, #ff4444, #8b0000); 
            color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 15px; margin-top: 20px; font-weight: bold;
        }
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; 
            background: #100a2e; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #333;
        }
        .nav-item { text-align: center; color: #888; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: gold; }
    </style>
</head>
<body>

    <h2>මගේ පැතිකඩ</h2>
    <img id="user-photo" class="profile-img" src="https://via.placeholder.com/100" alt="Profile">
    <h3 id="user-name-display" style="margin: 5px 0;">Loading...</h3>
    <div id="uid-display" onclick="copyUID()">UID: Loading...</div>

    <div style="margin-top: 25px;">
        <div class="info-box">
            <div class="label">පරිශීලක නාමය (Username)</div>
            <div id="username-section">
                <input type="text" id="username-input" placeholder="ඔබේ නම මෙතැන ලියන්න">
                <button class="save-btn" onclick="saveUsername()">නම සුරකින්න</button>
            </div>
        </div>

        <div class="info-box">
            <div class="label">ඊමේල් ලිපිනය</div>
            <div id="user-email" class="value">Loading...</div>
        </div>
    </div>

    <button class="logout-btn" onclick="logoutUser()">LOGOUT</button>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠<br>Home</a>
        <a href="wallet.html" class="nav-item">👜<br>Wallet</a>
        <a href="profile.html" class="nav-item active">👤<br>Profile</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('uid-display').innerText = "UID: " + user.uid;
                
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists && doc.data().username) {
                        const name = doc.data().username;
                        document.getElementById('user-name-display').innerText = name;
                        // Player_ නම නෙවෙයි නම්, input එක අයින් කර නම පෙන්වයි
                        if(!name.startsWith("Player_")) {
                            document.getElementById('username-section').innerHTML = `<div class="value">${name} ✅</div>`;
                        }
                    }
                });
            } else { window.location.href = "index.html"; }
        });

        function saveUsername() {
            const name = document.getElementById('username-input').value.trim();
            if (name.length < 3) return alert("නම කෙටි වැඩියි!");
            if (name.startsWith("Player_")) return alert("වෙනත් නමක් තෝරන්න!");

            db.collection("users").doc(auth.currentUser.uid).update({
                username: name
            }).then(() => alert("සාර්ථකව සුරැකුණා!"))
              .catch(e => {
                  // Document එක නැතිනම් පමණක් set භාවිතා කරයි
                  db.collection("users").doc(auth.currentUser.uid).set({
                      username: name,
                      uid: auth.currentUser.uid,
                      balance: 0
                  }, { merge: true });
              });
        }

        function copyUID() {
            navigator.clipboard.writeText(auth.currentUser.uid);
            alert("UID Copied!");
        }

        function logoutUser() {
            auth.signOut().then(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
