<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .section-title { color: gold; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; }
        .request-card { background: #1a1a4f; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 48%; }
        .approve-btn { background: #28a745; color: white; }
        .reject-btn { background: #dc3545; color: white; }
        .info-value { font-size: 16px; margin-bottom: 10px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: gold;">VISSA PRO Admin</h1>
    <h2 class="section-title">💰 Deposit Requests</h2>
    <div id="deposit-list">පරීක්ෂා කරමින්...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Deposit ලැයිස්තුව ලබා ගැනීම
        db.collection("deposits").where("status", "==", "pending")
        .onSnapshot((snapshot) => {
            const listDiv = document.getElementById('deposit-list');
            listDiv.innerHTML = snapshot.empty ? "<p>අලුත් Deposit නැත.</p>" : "";
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "request-card";
                div.innerHTML = `
                    <div class="info-value">User: ${data.userName || 'User'}</div>
                    <div class="info-value" style="color:#28a745;">Amount: LKR ${data.amount}</div>
                    <button class="btn approve-btn" onclick="approveDeposit('${doc.id}', '${data.uid}', ${data.amount})">APPROVE ✅</button>
                    <button class="btn reject-btn" onclick="rejectRequest('${doc.id}')">REJECT ❌</button>
                `;
                listDiv.appendChild(div);
            });
        });

        // 2. Approve Deposit (වැදගත්ම කොටස)
        async function approveDeposit(docId, userId, amount) {
            if (!userId || userId === "undefined") return alert("Error: User ID එකක් නැත!");
            if (!confirm("මෙම මුදල තැන්පත් කරන්නද?")) return;

            const userRef = db.collection("users").doc(userId);
            const depositRef = db.collection("deposits").doc(docId);

            try {
                await db.runTransaction(async (t) => {
                    const userDoc = await t.get(userRef);
                    if (!userDoc.exists) throw "User ගිණුම සොයාගත නොහැක!";
                    
                    const currentBal = parseFloat(userDoc.data().balance) || 0;
                    t.update(userRef, { balance: currentBal + parseFloat(amount) });
                    t.update(depositRef, { status: "completed" });
                });
                alert("සාර්ථකයි!");
            } catch (e) {
                alert("Error: " + e);
            }
        }

        function rejectRequest(docId) {
            db.collection("deposits").doc(docId).update({ status: "rejected" }).then(() => alert("ප්‍රතික්ෂේප කළා."));
        }
    </script>
</body>
</html>
