<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .section-title { color: gold; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; }
        .request-card { background: #1a1a4f; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .deposit-card { border-left: 5px solid #28a745; }
        .withdraw-card { border-left: 5px solid #dc3545; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 48%; }
        .approve-btn { background: #28a745; color: white; margin-right: 2%; }
        .reject-btn { background: #dc3545; color: white; }
        .info-label { color: #aaa; font-size: 11px; margin-top: 5px; text-transform: uppercase; }
        .info-value { font-size: 15px; margin-bottom: 5px; color: #fff; font-weight: bold; }
        .bank-box { background: #000; padding: 12px; border-radius: 8px; font-size: 13px; color: #00d4ff; border: 1px dashed #444; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: gold;">VISSA PRO Admin</h1>

    <h2 class="section-title">💰 Deposit Requests</h2>
    <div id="deposit-list">Loading...</div>

    <h2 class="section-title">🏦 Withdrawal Requests</h2>
    <div id="withdraw-list">Loading...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const MY_ADMIN_UID = "EM6KUIjRNzS8WFXxBrAEYIrZXzK2";

        // Admin check
        auth.onAuthStateChanged((user) => {
            if (user && user.uid === MY_ADMIN_UID) {
                loadDeposits();
                loadWithdrawals();
            } else {
                alert("අවසර නැත!");
                window.location.href = "index.html";
            }
        });

        // Load Deposits
        function loadDeposits() {
            db.collection("deposits").where("status", "==", "pending")
            .onSnapshot(snapshot => {
                const listDiv = document.getElementById('deposit-list');
                listDiv.innerHTML = snapshot.empty ? "<p>No pending deposits</p>" : "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    listDiv.innerHTML += `
                        <div class="request-card deposit-card">
                            <div class="info-label">User:</div><div class="info-value">${data.userName}</div>
                            <div class="info-label">Amount:</div><div class="info-value">LKR ${data.amount}</div>
                            <button class="btn approve-btn" onclick="approveDeposit('${doc.id}', '${data.uid}', '${data.amount}')">APPROVE ✅</button>
                            <button class="btn reject-btn" onclick="rejectRequest('deposits', '${doc.id}')">REJECT ❌</button>
                        </div>`;
                });
            });
        }

        // Load Withdrawals
        function loadWithdrawals() {
            db.collection("withdrawals").where("status", "==", "pending")
            .onSnapshot(snapshot => {
                const listDiv = document.getElementById('withdraw-list');
                listDiv.innerHTML = snapshot.empty ? "<p>No pending withdrawals</p>" : "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    listDiv.innerHTML += `
                        <div class="request-card withdraw-card">
                            <div class="info-label">User:</div><div class="info-value">${data.userName}</div>
                            <div class="info-label">Amount:</div><div class="info-value">LKR ${data.amount}</div>
                            <div class="bank-box">${data.bankDetails}</div>
                            <button class="btn approve-btn" onclick="approveWithdraw('${doc.id}', '${data.uid}', '${data.amount}')">PAID ✅</button>
                            <button class="btn reject-btn" onclick="rejectRequest('withdrawals', '${doc.id}')">REJECT ❌</button>
                        </div>`;
                });
            });
        }

        // Transaction logic for Approve
        async function approveDeposit(docId, userId, amount) {
            if(!confirm("Approve this deposit?")) return;
            try {
                await db.runTransaction(async (t) => {
                    const userRef = db.collection("users").doc(userId);
                    const userDoc = await t.get(userRef);
                    const currentBal = userDoc.exists ? (userDoc.data().balance || 0) : 0;
                    t.update(userRef, { balance: currentBal + parseFloat(amount) });
                    t.update(db.collection("deposits").doc(docId), { status: "completed" });
                });
                alert("Success!");
            } catch (e) { alert("Error: " + e.message); }
        }

        async function approveWithdraw(docId, userId, amount) {
            if(!confirm("Confirm Payment?")) return;
            try {
                await db.runTransaction(async (t) => {
                    const userRef = db.collection("users").doc(userId);
                    const userDoc = await t.get(userRef);
                    const currentBal = userDoc.data().balance || 0;
                    if(currentBal < parseFloat(amount)) throw new Error("Not enough balance!");
                    t.update(userRef, { balance: currentBal - parseFloat(amount) });
                    t.update(db.collection("withdrawals").doc(docId), { status: "completed" });
                });
                alert("Success!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function rejectRequest(col, id) {
            if(confirm("Reject?")) db.collection(col).doc(id).update({ status: "rejected" });
        }
    </script>
</body>
</html>
