<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .request-card { background: #1a1a4f; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid gold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; width: 45%; }
        .approve-btn { background: #28a745; color: white; margin-right: 5%; }
        .reject-btn { background: #dc3545; color: white; }
        .info-label { color: #aaa; font-size: 12px; margin-top: 5px; }
        .info-value { font-size: 16px; margin-bottom: 5px; color: gold; font-weight: bold; }
        #loading { text-align: center; margin-top: 50px; color: gold; }
    </style>
</head>
<body>

    <h2 style="color: gold;">Admin Panel - Deposit Requests</h2>
    <p style="font-size: 12px; color: #888;">මෙහිදී ඔබට පරිශීලකයින්ගේ මුදල් ඉල්ලීම් Approve කළ හැක.</p>
    <hr style="border: 0.5px solid #333;">

    <div id="requests-list">
        <div id="loading">දත්ත පරීක්ෂා කරමින්...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // 1. ඔබේ පෞද්ගලික Firebase Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966",
            measurementId: "G-KCKJLGX5J5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 2. ඔබේ Admin UID එක (මෙය ඔබට පමණක් ඇතුළු වීමට ඉඩ ලබා දෙයි)
        const MY_ADMIN_UID = "EM6KUIjRNzS8WFXxBrAEYIrZXzK2";

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.uid !== MY_ADMIN_UID) {
                    alert("ඔබට මෙම පිටුවට ඇතුළු වීමට අවසර නැත!");
                    window.location.href = "dashboard.html";
                } else {
                    console.log("Admin Authorized!");
                    loadRequests();
                }
            } else {
                window.location.href = "index.html";
            }
        });

        function loadRequests() {
            // 'deposits' collection එකේ pendingRequests බලනවා
            db.collection("deposits").where("status", "==", "pending")
            .onSnapshot((snapshot) => {
                const listDiv = document.getElementById('requests-list');
                listDiv.innerHTML = "";

                if (snapshot.empty) {
                    listDiv.innerHTML = "<p style='text-align:center; color:#666;'>අලුත් ඉල්ලීම් කිසිවක් නැත.</p>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = `
                        <div class="request-card">
                            <div class="info-label">පරිශීලකයා:</div>
                            <div class="info-value">${data.userName || 'Gamer'}</div>
                            
                            <div class="info-label">මුදල:</div>
                            <div class="info-value">LKR ${data.amount}</div>
                            
                            <div class="info-label">Ref Number:</div>
                            <div class="info-value">${data.reference}</div>

                            <button class="btn approve-btn" onclick="approveDeposit('${doc.id}', '${data.uid}', ${data.amount})">APPROVE ✅</button>
                            <button class="btn reject-btn" onclick="rejectDeposit('${doc.id}')">REJECT ❌</button>
                        </div>
                    `;
                    listDiv.innerHTML += card;
                });
            }, (error) => {
                console.error("Error loading data: ", error);
                document.getElementById('loading').innerText = "දත්ත ලබා ගැනීමට නොහැකි විය. (Rules පරීක්ෂා කරන්න)";
            });
        }

        async function approveDeposit(docId, userId, amount) {
            if(confirm("LKR " + amount + " ක මුදල මෙම පරිශීලකයාට ලබා දෙනවාද?")) {
                try {
                    const userRef = db.collection("users").doc(userId);
                    
                    await db.runTransaction(async (transaction) => {
                        const userDoc = await transaction.get(userRef);
                        
                        let currentBalance = 0;
                        if (userDoc.exists && userDoc.data().balance) {
                            currentBalance = parseFloat(userDoc.data().balance);
                        }

                        const newBalance = currentBalance + parseFloat(amount);

                        transaction.update(userRef, { balance: newBalance });
                        transaction.update(db.collection("deposits").doc(docId), { status: "completed" });
                    });

                    alert("මුදල් සාර්ථකව එකතු කළා! ✅");
                } catch (e) {
                    alert("Error: " + e.message);
                }
            }
        }

        function rejectDeposit(docId) {
            if(confirm("මෙම ඉල්ලීම ප්‍රතික්ෂේප කරන්නද?")) {
                db.collection("deposits").doc(docId).update({ status: "rejected" })
                .then(() => alert("ඉල්ලීම ප්‍රතික්ෂේප කළා."));
            }
        }
    </script>
</body>
</html>
