<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Super Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        .section-title { color: gold; border-bottom: 2px solid #444; padding-bottom: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dashboard Stats Style */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #1a1a4a; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid gold; }
        .stat-card h3 { margin: 0; font-size: 12px; color: #aaa; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; color: gold; }

        .request-card { background: #11113d; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .deposit-card { border-left: 6px solid #28a745; }
        .withdraw-card { border-left: 6px solid #dc3545; }
        .info-row { margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 0.5px solid #222; padding-bottom: 4px; }
        .label { color: gold; font-size: 12px; font-weight: bold; }
        .value { color: #fff; font-size: 14px; }
        .bank-details { background: #000; color: #00d4ff; padding: 10px; border-radius: 8px; font-size: 13px; margin: 10px 0; border: 1px dashed #444; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .approve-btn { background: #28a745; color: white; }
        .reject-btn { background: #dc3545; color: white; }
        .reset-btn { background: #555; color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: gold; margin-bottom: 5px;">VISSA PRO</h1>
    <p style="text-align: center; color: gray; font-size: 12px; margin-top: 0;">SUPER ADMIN MANAGEMENT</p>

    <h2 class="section-title">📊 System Overview</h2>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>TOTAL PROFIT (Your Earnings)</h3>
            <p id="total-profit">LKR 0.00</p>
        </div>
        <div class="stat-card" style="border-color: #1e90ff;">
            <h3>CURRENT LIVE POT</h3>
            <p id="live-pot" style="color: #1e90ff;">LKR 0.00</p>
        </div>
    </div>
    <button class="btn reset-btn" onclick="emergencyReset()">EMERGENCY GAME RESET ⚠️</button>

    <h2 class="section-title">💰 Deposit Requests</h2>
    <div id="deposit-list">පරීක්ෂා කරමින්...</div>

    <h2 class="section-title">🏦 Withdrawal Requests</h2>
    <div id="withdraw-list">පරීක්ෂා කරමින්...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script> <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            databaseURL: "https://vissaprocarrom-default-rtdb.firebaseio.com", // මෙතන ඔයාගේ DB URL එක බලන්න
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const rdb = firebase.database();
        const auth = firebase.auth();

        const MY_ADMIN_UID = "EM6KUIjRNzS8WFXxBrAEYIrZXzK2";

        auth.onAuthStateChanged(user => {
            if (user && user.uid === MY_ADMIN_UID) {
                initAdmin();
                listenToStats();
            } else {
                alert("අවසර නැත!");
                window.location.href = "index.html";
            }
        });

        // ලාභය සහ Live Pot එක Realtime පෙන්වීම
        function listenToStats() {
            // ඔයාගේ ලාභය පෙන්වීම
            rdb.ref('admin/profit').on('value', s => {
                document.getElementById('total-profit').innerText = "LKR " + (s.val() || 0).toFixed(2);
            });

            // දැනට ගේම් එකේ තියෙන මුදල පෙන්වීම
            rdb.ref('global_game/pot').on('value', s => {
                document.getElementById('live-pot').innerText = "LKR " + (s.val() || 0).toFixed(2);
            });
        }

        // ගේම් එකේ මොකක් හරි හිර වුණොත් Reset කරන්න
        function emergencyReset() {
            if (confirm("සැබවින්ම Game එක Reset කරන්නද? සියලුම Pot සල්ලි මකා දැමෙනු ඇත!")) {
                rdb.ref('global_game').set({ status: "WAITING", pot: 0 });
                alert("Game Reset Success!");
            }
        }

        function initAdmin() {
            // Load Pending Deposits
            db.collection("deposits").where("status", "==", "pending").onSnapshot(s => {
                const list = document.getElementById('deposit-list');
                list.innerHTML = s.empty ? "<p style='color:gray;'>අලුත් Deposit නැත.</p>" : "";
                s.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="request-card deposit-card">
                            <div class="info-row"><span class="label">USER</span><span class="value">${d.userName || 'Player'}</span></div>
                            <div class="info-row"><span class="label">AMOUNT</span><span class="value" style="color:#28a745; font-weight:bold;">LKR ${d.amount}</span></div>
                            <div class="info-row"><span class="label">UID</span><span class="value" style="font-size:10px;">${d.uid}</span></div>
                            <div class="btn-group">
                                <button class="btn approve-btn" onclick="handleDeposit('${doc.id}', '${d.uid}', ${d.amount})">APPROVE ✅</button>
                                <button class="btn reject-btn" onclick="rejectReq('deposits', '${doc.id}')">REJECT ❌</button>
                            </div>
                        </div>`;
                });
            });

            // Load Pending Withdrawals
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(s => {
                const list = document.getElementById('withdraw-list');
                list.innerHTML = s.empty ? "<p style='color:gray;'>අලුත් Withdrawal නැත.</p>" : "";
                s.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="request-card withdraw-card">
                            <div class="info-row"><span class="label">USER</span><span class="value">${d.userName}</span></div>
                            <div class="info-row"><span class="label">AMOUNT</span><span class="value" style="color:#dc3545; font-weight:bold;">LKR ${d.amount}</span></div>
                            <div class="bank-details">${d.bankDetails || 'No Bank Info'}</div>
                            <div class="btn-group">
                                <button class="btn approve-btn" onclick="handleWithdraw('${doc.id}', '${d.uid}', ${d.amount})">PAID & CLEAR ✅</button>
                                <button class="btn reject-btn" onclick="rejectReq('withdrawals', '${doc.id}')">REJECT ❌</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- Deposit Handling ---
        async function handleDeposit(docId, uId, amt) {
            if (!confirm("LKR " + amt + " තැන්පත් කරන්නද?")) return;
            const uRef = db.collection("users").doc(uId);
            const dRef = db.collection("deposits").doc(docId);
            try {
                await db.runTransaction(async (t) => {
                    const doc = await t.get(uRef);
                    if (!doc.exists) throw "User Not Found";
                    let newBal = (parseFloat(doc.data().balance) || 0) + parseFloat(amt);
                    t.update(uRef, { balance: newBal });
                    t.update(dRef, { status: "completed" });
                });
                alert("Deposit Success!");
            } catch (e) { alert("Error: " + e); }
        }

        // --- Withdrawal Handling ---
        async function handleWithdraw(docId, uId, amt) {
            if (!confirm("ඔබ මුදල් යැවුවාද? මෙය Approve කළ පසු User ගේ Balance එකෙන් LKR " + amt + " කැපෙනු ඇත.")) return;
            const uRef = db.collection("users").doc(uId);
            const wRef = db.collection("withdrawals").doc(docId);
            try {
                await db.runTransaction(async (t) => {
                    const doc = await t.get(uRef);
                    if (!doc.exists) throw "User Not Found";
                    let curBal = parseFloat(doc.data().balance) || 0;
                    if (curBal < amt) throw "Balance එක මදි!";
                    t.update(uRef, { balance: curBal - parseFloat(amt) });
                    t.update(wRef, { status: "completed" });
                });
                alert("Withdrawal Processed!");
            } catch (e) { alert("Error: " + e); }
        }

        function rejectReq(col, docId) {
            if (confirm("මෙය ප්‍රතික්ෂේප කරන්නද?")) {
                db.collection(col).doc(docId).update({ status: "rejected" });
            }
        }
    </script>
</body>
</html>
