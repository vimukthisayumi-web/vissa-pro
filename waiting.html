<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Matching</title>
    <style>
        body { background: #050510; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .match-box { text-align: center; background: #0d0d2b; padding: 30px; border-radius: 20px; border: 2px solid gold; width: 85%; max-width: 400px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .p-img { width: 70px; height: 70px; border: 2px solid gold; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #222; margin: 0 auto; transition: 0.5s; }
        .vs-circle { width: 50px; height: 50px; background: gold; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 20px auto; box-shadow: 0 0 10px gold; }
        .loader { border: 4px solid #333; border-top: 4px solid gold; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .finding-text { font-size: 14px; color: gold; margin-bottom: 10px; letter-spacing: 1px; }
        #error-display { color: #ff4444; font-size: 12px; margin-top: 15px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <div class="match-box">
        <div class="finding-text" id="status">ප්‍රතිවාදියෙකු සොයමින්...</div>
        <div class="loader" id="main-loader"></div>
        
        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div>
                <div class="p-img" id="my-avatar">ඔබ</div>
                <p style="font-size: 12px; margin-top: 12px;">ඔබ</p>
            </div>
            <div class="vs-circle">VS</div>
            <div>
                <div class="p-img" id="opp-avatar" style="border-style: dashed; opacity: 0.5;">?</div>
                <p id="opp-name" style="font-size: 12px; margin-top: 12px; color: #888;">සොයමින්...</p>
            </div>
        </div>
        
        <div id="error-display"></div>
        <button onclick="cancelMatch()" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:10px 25px; border-radius:12px; margin-top: 35px; cursor:pointer;">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const fee = parseInt(urlParams.get('fee')) || 100;

        auth.onAuthStateChanged(user => {
            if (user) startMatchingProcess(user.uid);
            else window.location.href = "index.html";
        });

        async function startMatchingProcess(myId) {
            const waitingRef = db.collection("waiting_players");
            const matchesRef = db.collection("active_matches");

            try {
                // 1. පෝලිමේ සිටින තමන් නොවන ප්ලේයර් කෙනෙක් සෙවීම
                const snapshot = await waitingRef
                    .where("fee", "==", fee)
                    .orderBy("time", "asc")
                    .get();

                let opponent = null;
                snapshot.forEach(doc => {
                    if (doc.id !== myId) { opponent = doc.data(); }
                });

                if (opponent) {
                    // 🤝 ප්‍රතිවාදියෙක් හමුවුණා! Match එක හදනවා
                    const matchId = opponent.uid; // පරණ ප්ලේයර්ගේ ID එක matchId එක ලෙස ගනී
                    await matchesRef.doc(matchId).set({
                        player1: opponent.uid,
                        player2: myId,
                        fee: fee,
                        status: "playing",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // පෝලිමෙන් ප්‍රතිවාදියා අයින් කරයි
                    await waitingRef.doc(opponent.uid).delete();
                    
                    updateUIFound();
                    goToGame(matchId);
                } else {
                    // 🕒 කවුරුත් නැහැ, පෝලිමට ඇතුළු වී බලා සිටී
                    await waitingRef.doc(myId).set({
                        uid: myId,
                        fee: fee,
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 🛰️ වෙනත් කෙනෙක් තමන්ව තෝරාගන්නා තෙක් Listen කරයි
                    const unsubscribe = matchesRef.doc(myId).onSnapshot(doc => {
                        if (doc.exists && doc.data().status === "playing") {
                            unsubscribe();
                            updateUIFound();
                            goToGame(myId);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-display').style.display = "block";
                document.getElementById('error-display').innerText = "Database Error: Index එකක් අවශ්‍ය විය හැක.";
            }
        }

        function updateUIFound() {
            document.getElementById('opp-avatar').style.opacity = "1";
            document.getElementById('opp-avatar').style.borderStyle = "solid";
            document.getElementById('opp-name').innerText = "ප්‍රතිවාදියා හමුවුණා!";
            document.getElementById('status').innerText = "සූදානම් වන්න...";
            document.getElementById('main-loader').style.borderTopColor = "#00ffcc";
        }

        function goToGame(matchId) {
            setTimeout(() => {
                window.location.href = "color_online.html?matchId=" + matchId;
            }, 2000);
        }

        function cancelMatch() {
            const uid = auth.currentUser.uid;
            db.collection("waiting_players").doc(uid).delete().then(() => {
                window.location.href = "dashboard.html";
            });
        }
    </script>
</body>
</html>
