<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO - Matching</title>
    <style>
        body { background: #050510; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .match-box { text-align: center; background: #0d0d2b; padding: 30px; border-radius: 20px; border: 2px solid gold; width: 85%; max-width: 400px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .p-img { width: 70px; height: 70px; border: 2px solid gold; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #222; margin: 0 auto; transition: 0.5s; }
        .vs-circle { width: 50px; height: 50px; background: gold; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 20px auto; box-shadow: 0 0 10px gold; }
        .loader { border: 4px solid #333; border-top: 4px solid gold; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .finding-text { font-size: 14px; color: gold; margin-bottom: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="match-box">
        <div class="finding-text" id="status">ප්‍රතිවාදියෙකු සොයමින්...</div>
        <div class="loader" id="main-loader"></div>
        
        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div>
                <div class="p-img" id="my-avatar">ඔබ</div>
                <p style="font-size: 12px; margin-top: 12px; color: white;">ඔබ</p>
            </div>
            <div class="vs-circle">VS</div>
            <div>
                <div class="p-img" id="opp-avatar" style="border-style: dashed; opacity: 0.5;">?</div>
                <p id="opp-name" style="font-size: 12px; margin-top: 12px; color: #888;">සොයමින්...</p>
            </div>
        </div>
        
        <button onclick="cancelMatch()" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:10px 25px; border-radius:12px; margin-top: 35px; cursor:pointer; font-weight: bold; font-size: 13px;">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const fee = parseInt(urlParams.get('fee')) || 100;

        auth.onAuthStateChanged(user => {
            if (user) {
                startMatchingProcess(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        async function startMatchingProcess(myId) {
            const waitingRef = db.collection("waiting_players");

            try {
                // 1. මේ ගාස්තුවටම බලාගෙන ඉන්න වෙනත් කෙනෙක් ඉන්නවද බලන්න
                const snapshot = await waitingRef
                    .where("fee", "==", fee)
                    .where("uid", "!=", myId)
                    .limit(1)
                    .get();

                if (!snapshot.empty) {
                    const opponent = snapshot.docs[0].data();
                    const matchId = opponent.uid; // පරණ ප්ලේයර්ගේ ID එක මැච් ID එක ලෙස ගන්නවා

                    // UI එක වෙනස් කරන්න
                    updateUIFound();

                    // මැච් එක සක්‍රීය කරන්න
                    await db.collection("active_matches").doc(matchId).set({
                        player1: opponent.uid,
                        player2: myId,
                        fee: fee,
                        status: "playing",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // ප්‍රතිවාදියාව Waiting List එකෙන් ඉවත් කරන්න
                    await waitingRef.doc(opponent.uid).delete();
                    
                    goToGame(matchId);
                } else {
                    // කෙනෙක් නැතිනම් මාව ලිස්ට් එකට එකතු කරන්න
                    await waitingRef.doc(myId).set({
                        uid: myId,
                        fee: fee,
                        time: Date.now()
                    });

                    // කවුරුහරි මාව සම්බන්ධ කරනකම් බලාගෙන ඉන්න
                    db.collection("active_matches").doc(myId).onSnapshot(doc => {
                        if (doc.exists) {
                            updateUIFound();
                            goToGame(myId);
                        }
                    }, error => {
                        console.error("Snapshot error:", error);
                    });
                }
            } catch (err) {
                console.error("Matchmaking error:", err);
                alert("දත්ත දෝෂයක්! කරුණාකර නැවත උත්සාහ කරන්න.");
            }
        }

        function updateUIFound() {
            document.getElementById('opp-avatar').style.opacity = "1";
            document.getElementById('opp-avatar').style.borderStyle = "solid";
            document.getElementById('opp-name').innerText = "ප්‍රතිවාදියා හමුවුණා!";
            document.getElementById('status').innerText = "තරඟයට පිවිසෙමින්...";
        }

        function goToGame(matchId) {
            setTimeout(() => {
                window.location.href = "carrom_online.html?matchId=" + matchId;
            }, 1500);
        }

        function cancelMatch() {
            const user = auth.currentUser;
            if (user) {
                db.collection("waiting_players").doc(user.uid).delete().then(() => {
                    window.location.href = "dashboard.html";
                });
            }
        }
    </script>
</body>
</html>
