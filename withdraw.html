<!DOCTYPE html>
<html lang="si">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2301451864981961"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මුදල් ලබාගන්න - VISSA PRO</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); 
            color: white; 
            margin: 0; 
            padding: 20px;
        }
        .back-btn { color: gold; text-decoration: none; font-size: 18px; display: block; margin-bottom: 20px; }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            margin: auto;
        }

        h2 { font-size: 24px; margin-bottom: 20px; text-align: left; }
        
        label { font-size: 14px; color: #aaa; display: block; margin-bottom: 5px; margin-top: 15px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        .withdraw-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #ff9000, #ff5e00);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 144, 0, 0.3);
        }
    </style>
</head>
<body>

    <a href="wallet.html" class="back-btn">❮ ආපසු පසුම්බියට</a>
    <h2>මුදල් ලබාගන්න</h2>

    <div class="container">
        <label>ලබාගන්නා ක්‍රමය (Method)</label>
        <select id="method">
            <option value="Bank Transfer">Bank Transfer</option>
        </select>

        <label>මුදල් ප්‍රමාණය (Amount - LKR)</label>
        <input type="number" id="amount" placeholder="උදා: 500">

        <label>බැංකුවේ නම (Bank Name)</label>
        <input type="text" id="bank-name" placeholder="උදා: Commercial Bank">

        <label>ශාඛාව (Branch)</label>
        <input type="text" id="branch" placeholder="උදා: Veyangoda">

        <label>ගිණුම් අංකය (Account Number)</label>
        <input type="text" id="acc-number" placeholder="Account Number">

        <label>ගිණුම් හිමිකරුගේ නම (Account Holder Name)</label>
        <input type="text" id="acc-name" placeholder="Account Holder Name">

        <button class="withdraw-btn" onclick="submitWithdraw()">WITHDRAW NOW</button>
    </div>

    <p style="text-align:center; font-size: 11px; color: #888; margin-top: 20px;">
        * අවම මුදල් ලබාගැනීම LKR 100 කි.<br>
        * වැඩ කරන දින 1ක් ඇතුළත මුදල් ඔබ වෙත ලැබෙනු ඇත.
    </p>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function submitWithdraw() {
            const user = auth.currentUser;
            if (!user) { alert("කරුණාකර ලොග් වන්න."); return; }

            const amount = parseFloat(document.getElementById('amount').value);
            const bank = document.getElementById('bank-name').value;
            const branch = document.getElementById('branch').value;
            const accNum = document.getElementById('acc-number').value;
            const holderName = document.getElementById('acc-name').value;

            if (!amount || amount < 100) { alert("අවම මුදල LKR 100 කි."); return; }
            if (!bank || !branch || !accNum || !holderName) { alert("සියලුම බැංකු විස්තර ඇතුළත් කරන්න."); return; }

            // මුලින්ම පරිශීලකයාගේ දැනට තියෙන බැලන්ස් එක පරීක්ෂා කරනවා
            db.collection("users").doc(user.uid).get().then((doc) => {
                const currentBalance = doc.data().balance || 0;

                if (currentBalance >= amount) {
                    // බැලන්ස් එක ඇති නම් විස්තර Firestore එකට යවනවා
                    db.collection("withdrawals").add({
                        uid: user.uid,
                        userName: holderName, // ගිණුමේ නම
                        amount: amount,
                        bankDetails: `Bank: ${bank}, Branch: ${branch}, Acc: ${accNum}`,
                        status: "pending",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert("මුදල් ලබාගැනීමේ ඉල්ලීම සාර්ථකව යොමු කළා! ✅");
                        window.location.href = "wallet.html";
                    });
                } else {
                    alert("ඔබේ ගිණුමේ ප්‍රමාණවත් මුදලක් නොමැත.");
                }
            });
        }
    </script>
</body>
</html>
