<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - VISSA PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #08051a; color: white; padding: 20px; }
        
        .back-btn { color: gold; cursor: pointer; text-decoration: none; display: block; margin-bottom: 20px; }
        
        .card { background: #1a1a4f; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.3); margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 10px; font-size: 14px; color: #aaa; }
        
        select, input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #0d0d2b; 
            color: white; 
            box-sizing: border-box;
        }

        .withdraw-btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 50px; 
            border: none; 
            background: linear-gradient(45deg, #f83600, #f9d423); 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }

        .note { font-size: 11px; color: #888; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <a class="back-btn" onclick="window.location.href='wallet.html'">❮ ආපසු පසුම්බියට</a>

    <h2>මුදල් ලබාගන්න</h2>

    <div class="card">
        <label>ලබාගන්නා ක්‍රමය (Method)</label>
        <select id="method">
            <option>Bank Transfer</option>
            <option>eZ Cash</option>
            <option>mCash</option>
        </select>

        <label>මුදල් ප්‍රමාණය (Amount - LKR)</label>
        <input type="number" id="amount" placeholder="උදා: 500">

        <label>ගිණුම් අංකය / දුරකථන අංකය</label>
        <input type="text" id="account" placeholder="Account or Phone Number">

        <button class="withdraw-btn" onclick="processWithdraw()">WITHDRAW NOW</button>
    </div>

    <div class="note">
        * අවම මුදල් ලබාගැනීම LKR 100 කි.<br>
        * වැඩ කරන දින 1ක් ඇතුළත මුදල් ඔබ වෙත ලැබෙනු ඇත.
    </div>

    <script>
        function processWithdraw() {
            let amt = document.getElementById('amount').value;
            if(amt < 100) {
                alert("අවම වශයෙන් රුපියල් 100ක් ඇතුළත් කරන්න.");
            } else {
                alert("ඔබේ ඉල්ලීම සාර්ථකව යොමු කරන ලදී! පරීක්ෂා කිරීමෙන් පසු මුදල් ලැබෙනු ඇත.");
                window.location.href='wallet.html';
            }
        }
    </script>

</body>
</html>
