<!DOCTYPE html>
<html lang="si">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2301451864981961"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - VISSA PRO</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); 
            color: white; 
            margin: 0; 
            padding: 20px;
            padding-bottom: 80px; 
        }

        .wallet-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { background: rgba(255,255,255,0.1); border: none; color: gold; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; cursor: pointer; }

        .balance-card {
            background: linear-gradient(135deg, #2e2e8e 0%, #1a1a4f 100%);
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }
        .balance-label { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .balance-amount { font-size: 36px; font-weight: bold; color: gold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        .action-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .action-btn { padding: 18px; border-radius: 20px; border: none; color: white; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .deposit { background: linear-gradient(45deg, #00b09b, #96c93d); }
        .withdraw { background: linear-gradient(45deg, #f83600, #f9d423); }

        /* ගනුදෙනු ඉතිහාසය Styles */
        .history-title { font-size: 17px; border-left: 4px solid #0cf; padding-left: 10px; margin-bottom: 15px; }
        .history-item { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .type-tag { font-size: 10px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: block; }
        .deposit-text { color: #00ffcc; }
        .withdraw-text { color: #ff4d4d; }
        
        .status-badge { 
            padding: 5px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
        }
        .pending { background: #ff9800; color: #000; }
        .success { background: #4caf50; color: #fff; }
        .rejected { background: #f44336; color: #fff; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #100a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: gold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="wallet-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'">❮</button>
        <h2 style="margin:0;">මුදල් පසුම්බිය</h2>
    </div>

    <div class="balance-card">
        <div class="balance-label">දැනට ඇති මුළු මුදල</div>
        <div class="balance-amount">LKR <span id="wallet-balance">0.00</span></div>
    </div>

    <div class="action-container">
        <button class="action-btn deposit" onclick="window.location.href='deposit.html'">
            <span style="font-size:24px;">💰</span>DEPOSIT
        </button>
        <button class="action-btn withdraw" onclick="window.location.href='withdraw.html'">
            <span style="font-size:24px;">💳</span>WITHDRAW
        </button>
    </div>

    <div class="history-title">ගනුදෙනු ඉතිහාසය (History)</div>
    <div id="history-list">
        <p style="text-align:center; color:#666; font-size:12px;">ගනුදෙනු පරීක්ෂා කරමින්...</p>
    </div>

    <div class="bottom-nav">
        <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span>මුල් පිටුව</a>
        <a class="nav-item active" href="wallet.html"><span class="nav-icon">👜</span>පසුම්බිය</a>
        <a class="nav-item" href="events.html"><span class="nav-icon">🏆</span>සිදුවීම්</a>
        <a class="nav-item" href="notifications.html"><span class="nav-icon">🔔</span>දැනුම්දීම්</a>
        <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span>පැතිකඩ</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
            authDomain: "vissaprocarrom.firebaseapp.com",
            projectId: "vissaprocarrom",
            storageBucket: "vissaprocarrom.firebasestorage.app",
            messagingSenderId: "722305696915",
            appId: "1:722305696915:web:056e8be25a245ac29c7966"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                // 1. සජීවීව බැලන්ස් එක පරීක්ෂා කිරීම
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists && doc.data().balance !== undefined) {
                        document.getElementById('wallet-balance').innerText = doc.data().balance.toFixed(2);
                    }
                });

                // 2. ගනුදෙනු ඉතිහාසය පෙන්වීම
                loadHistory(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function loadHistory(uid) {
            const historyList = document.getElementById('history-list');

            // Deposits සහ Withdrawals යන දෙකම එකවර පරීක්ෂා කිරීම
            // මුලින්ම Deposits ලබාගැනීම
            db.collection("deposits").where("uid", "==", uid).orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                renderHistory(uid);
            });

            db.collection("withdrawals").where("uid", "==", uid).orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                renderHistory(uid);
            });
        }

        async function renderHistory(uid) {
            const historyList = document.getElementById('history-list');
            let combinedHistory = [];

            // Deposits දත්ත ලබාගැනීම
            const depSnap = await db.collection("deposits").where("uid", "==", uid).get();
            depSnap.forEach(doc => {
                combinedHistory.push({ ...doc.data(), type: 'Deposit' });
            });

            // Withdrawals දත්ත ලබාගැනීම
            const withSnap = await db.collection("withdrawals").where("uid", "==", uid).get();
            withSnap.forEach(doc => {
                combinedHistory.push({ ...doc.data(), type: 'Withdraw' });
            });

            // දිනය අනුව අලුත් ඒවා උඩට එන ලෙස සකස් කිරීම
            combinedHistory.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            if (combinedHistory.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#666; font-size:12px;">තවමත් ගනුදෙනු සිදුකර නොමැත.</p>';
                return;
            }

            historyList.innerHTML = "";
            combinedHistory.forEach(item => {
                const isDeposit = item.type === 'Deposit';
                const sign = isDeposit ? "+" : "-";
                const colorClass = isDeposit ? "deposit-text" : "withdraw-text";
                const statusClass = item.status === 'pending' ? 'pending' : (item.status === 'completed' ? 'success' : 'rejected');
                const statusLabel = item.status === 'pending' ? 'PENDING' : (item.status === 'completed' ? 'SUCCESS' : 'REJECTED');

                historyList.innerHTML += `
                    <div class="history-item">
                        <div>
                            <span class="type-tag ${colorClass}">${item.type}</span>
                            <span style="font-weight:bold; font-size:15px; color:${isDeposit ? '#0f0' : '#f44'};">
                                ${sign} LKR ${parseFloat(item.amount).toFixed(2)}
                            </span>
                        </div>
                        <div class="status-badge ${statusClass}">${statusLabel}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
