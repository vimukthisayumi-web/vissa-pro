<!DOCTYPE html>
<html lang="si">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2301451864981961"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Color Battle - Betting Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Betting Header Style */
        .match-header {
            width: 100%;
            background: #2d2d2d;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 3px solid #ff4757;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .player-info { width: 30%; }
        .player-name { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .player-score { font-size: 24px; font-weight: bold; color: #fff; }

        .pot-container {
            background: #444;
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid #ff4757;
        }
        .pot-label { font-size: 10px; color: #ff4757; text-transform: uppercase; }
        .pot-amount { font-size: 18px; font-weight: bold; color: #2ed573; }

        /* Timer Bar */
        #timer-bar { width: 100%; height: 6px; background: #333; }
        #timer-progress { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear; }

        /* Game Area */
        #color-text { 
            font-size: 65px; 
            font-weight: 900; 
            margin: 60px 0; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            transition: transform 0.1s;
        }

        .btn-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            width: 90%; 
            max-width: 400px; 
        }

        button { 
            padding: 30px; 
            font-size: 18px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 5px 0 #000;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        .btn-red { background: #ff4d4d; color: white; }
        .btn-blue { background: #1e90ff; color: white; }
        .btn-green { background: #2ed573; color: white; }
        .btn-yellow { background: #ffa502; color: white; }

    </style>
</head>
<body>

    <div class="match-header">
        <div class="player-info">
            <div class="player-name">ඔබ</div>
            <div id="my-score" class="player-score">0</div>
        </div>

        <div class="pot-container">
            <div class="pot-label">TOTAL POT</div>
            <div class="pot-amount">Rs. <span id="total-pot">200</span></div>
        </div>

        <div class="player-info">
            <div class="player-name">ප්‍රතිවාදියා</div>
            <div id="opp-score" class="player-score">0</div>
        </div>
    </div>

    <div id="timer-bar"><div id="timer-progress"></div></div>

    <div id="color-text">READY</div>

    <div class="btn-container">
        <button class="btn-red" onclick="checkAnswer('red')">RED</button>
        <button class="btn-blue" onclick="checkAnswer('blue')">BLUE</button>
        <button class="btn-green" onclick="checkAnswer('green')">GREEN</button>
        <button class="btn-yellow" onclick="checkAnswer('yellow')">YELLOW</button>
    </div>

    <script>
        const colors = ["red", "blue", "green", "yellow"];
        let targetColor = "";
        let score = 0;
        let timerInterval;
        const TIME_LIMIT = 1500; // තත්පර 1.5

        function nextQuestion() {
            const randomName = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            
            const display = document.getElementById("color-text");
            display.innerText = randomName;
            display.style.color = targetColor;
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            let startTime = Date.now();

            timerInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let remaining = Math.max(0, TIME_LIMIT - elapsed);
                let percentage = (remaining / TIME_LIMIT) * 100;
                
                document.getElementById("timer-progress").style.width = percentage + "%";

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    gameOver("කාලය අවසන්!");
                }
            }, 30);
        }

        function checkAnswer(chosenColor) {
            if (chosenColor === targetColor) {
                score++;
                document.getElementById("my-score").innerText = score;
                // මෙතනදී Firebase එකට score update එක යවන්න
                nextQuestion();
            } else {
                gameOver("වැරදි වර්ණයක්!");
            }
        }

        function gameOver(msg) {
            clearInterval(timerInterval);
            alert(msg + "\nඔබේ ලකුණු: " + score);
            score = 0;
            document.getElementById("my-score").innerText = score;
            setTimeout(nextQuestion, 1000);
        }

        // ආරම්භය
        window.onload = () => {
            setTimeout(nextQuestion, 1000);
        };
    </script>
</body>
</html>
