<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vissa-Pro Betting Battle</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --bg: #0f0f0f;
            --card: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); 
            color: white; margin: 0; display: flex; flex-direction: column; height: 100vh;
        }

        /* Header Section */
        .match-header {
            background: var(--card); padding: 20px; display: flex;
            justify-content: space-around; align-items: center; border-bottom: 3px solid var(--primary);
        }

        .player-info { text-align: center; width: 30%; }
        .p-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .p-balance { font-size: 22px; font-weight: bold; color: #fff; }

        .pot-box {
            background: #2a2a2a; padding: 10px 20px; border-radius: 50px;
            border: 1px solid var(--primary); text-align: center;
        }
        .pot-label { font-size: 10px; color: var(--primary); font-weight: bold; }
        .pot-val { font-size: 18px; font-weight: bold; color: var(--secondary); }

        /* Progress Bar */
        #timer-wrap { width: 100%; height: 8px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.05s linear; }

        /* Game Area */
        .game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #display-word { font-size: 80px; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .color-btn { height: 85px; border: none; border-radius: 18px; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 0 #000; }
        .color-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Bottom Controls */
        .footer { background: var(--card); padding: 15px; display: flex; gap: 15px; width: 100%; box-sizing: border-box; }
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        #btn-bet { background: var(--primary); }
        #btn-cashout { background: var(--secondary); }
    </style>
</head>
<body>

    <div class="match-header">
        <div class="player-info">
            <div class="p-label">ඔබ (Balance)</div>
            <div id="my-bal-ui" class="p-balance">Rs. 100</div>
        </div>
        <div class="pot-box">
            <div class="pot-label">ROUND STAKE</div>
            <div id="pot-ui" class="pot-val">Rs. 0</div>
        </div>
        <div class="player-info">
            <div class="p-label">ප්‍රතිවාදියා</div>
            <div id="opp-bal-ui" class="p-balance">Rs. 100</div>
        </div>
    </div>

    <div id="timer-wrap"><div id="timer-fill"></div></div>

    <main class="game-zone">
        <div id="display-word">READY</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="input('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="input('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="input('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="input('yellow')"></button>
        </div>
    </main>

    <footer class="footer">
        <button id="btn-bet" class="action-btn" onclick="startBet()">START BET (Rs. 15)</button>
        <button id="btn-cashout" class="action-btn" onclick="cashOut()">CASH OUT</button>
    </footer>

    <script>
        const colors = ["red", "blue", "green", "yellow"];
        let targetColor = "";
        let isGameActive = false;
        let timer;
        const TIME_LIMIT = 1500;

        // මුදල් සම්බන්ධ අගයන්
        let myBal = 100; 
        let oppBal = 100;
        const ROUND_FEE = 15;
        const WIN_PER_CLICK = 10;
        const MAX_LIMIT = 180;

        function updateUI() {
            document.getElementById('my-bal-ui').innerText = "Rs. " + myBal;
            document.getElementById('opp-bal-ui').innerText = "Rs. " + oppBal;
        }

        function startBet() {
            if(isGameActive) return;
            if(myBal < ROUND_FEE) { alert("සල්ලි මදි!"); return; }

            // වටයකට රු. 15 කැපේ
            myBal -= ROUND_FEE;
            document.getElementById('pot-ui').innerText = "Rs. " + ROUND_FEE;
            updateUI();

            isGameActive = true;
            document.getElementById('btn-bet').innerText = "LIVE...";
            nextRound();
        }

        function nextRound() {
            if(!isGameActive) return;
            let txt = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            let el = document.getElementById('display-word');
            el.innerText = txt.toUpperCase();
            el.style.color = targetColor;
            runTimer();
        }

        function runTimer() {
            clearInterval(timer);
            let start = Date.now();
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let prog = Math.max(0, 100 - (diff / TIME_LIMIT * 100));
                document.getElementById('timer-fill').style.width = prog + "%";
                if(diff >= TIME_LIMIT) endGame("කාලය අවසන්! (රු. 15 පද්ධතියට හිමි විය)");
            }, 20);
        }

        function input(choice) {
            if(!isGameActive) return;
            if(choice === targetColor) {
                // නිවැරදි නම් ප්‍රතිවාදියාගෙන් රු. 10ක් ඔබට ලැබේ
                myBal += WIN_PER_CLICK;
                oppBal -= WIN_PER_CLICK;
                updateUI();
                if(myBal >= MAX_LIMIT) { 
                    alert("උපරිම සීමාව (180) පහු කළා! රු. 20ක ගාස්තුවක් අය විය.");
                    location.href = "/next-room"; // 200 room එකට යෑම
                }
                nextRound();
            } else {
                endGame("වැරදි වර්ණයක්! (රු. 15 පද්ධතියට හිමි විය)");
            }
        }

        function endGame(msg) {
            isGameActive = false;
            clearInterval(timer);
            alert(msg);
            resetGame();
        }

        function cashOut() {
            alert("ඔබේ ගිණුමට රු. " + myBal + " එකතු විය!");
            resetGame();
        }

        function resetGame() {
            isGameActive = false;
            document.getElementById('display-word').innerText = "READY";
            document.getElementById('display-word').style.color = "white";
            document.getElementById('btn-bet').innerText = "START BET (Rs. 15)";
            document.getElementById('pot-ui').innerText = "Rs. 0";
            document.getElementById('timer-fill').style.width = "100%";
        }
    </script>
</body>
</html>
