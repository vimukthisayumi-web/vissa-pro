<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom King 3D - Fixed</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --wood-frame: #5c3a21;
            --wood-light: #8a5a3a;
            --board-surface: #f3e5ab;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white;
            user-select: none; touch-action: none;
        }

        /* --- UI Overlay --- */
        .ui-top {
            position: absolute; top: 10px; width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            z-index: 10; pointer-events: none;
        }

        .player-badge {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            padding: 8px 15px; border-radius: 25px;
            display: flex; align-items: center; gap: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        .player-badge.active {
            border-color: #ffd700;
            background: rgba(50, 50, 50, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid white; overflow: hidden; background: #333;
        }
        
        .score-box { text-align: right; }
        .score-val { font-size: 22px; font-weight: 800; color: #ffd700; }
        .score-label { font-size: 11px; text-transform: uppercase; color: #ccc; letter-spacing: 1px; }

        /* --- Game Board --- */
        #game-container {
            position: relative;
            border: 25px solid var(--wood-frame);
            border-radius: 40px;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.8),
                0 20px 60px rgba(0,0,0,0.6),
                0 0 0 5px #3a2515;
            width: 95vw; height: 95vw;
            max-width: 600px; max-height: 600px;
            background: var(--board-surface);
            box-sizing: border-box;
            overflow: hidden;
            z-index: 1;
        }

        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* --- Menus (Moved outside container) --- */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .menu-card {
            background: white; color: #333; padding: 40px; border-radius: 20px;
            text-align: center; width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .menu-card h1 { 
            margin: 0 0 15px; font-size: 36px; color: var(--wood-frame); 
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        .btn {
            background: linear-gradient(to bottom, #ff9933, #e68a00);
            border: none; color: white; padding: 15px 40px;
            font-size: 20px; font-weight: bold; border-radius: 50px;
            cursor: pointer; margin-top: 20px; width: 100%;
            box-shadow: 0 6px #b36b00; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #b36b00; }

        #game-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); color: white; padding: 10px 25px;
            border-radius: 50px; font-size: 28px; font-weight: bold;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            z-index: 50; white-space: nowrap; border: 2px solid #ffd700;
        }

        .controls-hint {
            margin-top: 25px; font-size: 14px; opacity: 0.7; color: white;
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 20px;
        }

    </style>
</head>
<body>

    <!-- Start Menu (Outside container for Full Screen) -->
    <div id="menu-overlay">
        <div class="menu-card">
            <h1>Carrom 3D</h1>
            <p>Pocket White pieces.<br>Queen is 50pts.</p>
            <div style="font-size: 13px; color: #666; margin: 15px 0; text-align: left; background: #f5f5f5; padding: 15px; border-radius: 12px;">
                <b>How to Play:</b><br>
                👆 <b>Drag</b> striker left/right to aim.<br>
                🏹 <b>Pull Back</b> (downwards) to power.<br>
                ✨ <b>Release</b> to shoot!
            </div>
            <button class="btn" onclick="startGame()">PLAY</button>
        </div>
    </div>

    <!-- Top UI -->
    <div class="ui-top">
        <div class="player-badge active" id="p1-badge">
            <div class="avatar"><div style="width:100%;height:100%;background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix');background-size:cover;"></div></div>
            <div class="score-box">
                <div class="score-label">You</div>
                <div class="score-val" id="score-p1">0</div>
            </div>
        </div>
        <div class="player-badge" id="p2-badge">
            <div class="score-box" style="text-align:left;">
                <div class="score-label">CPU</div>
                <div class="score-val" id="score-p2">0</div>
            </div>
            <div class="avatar"><div style="width:100%;height:100%;background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka');background-size:cover;"></div></div>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <canvas id="carromCanvas"></canvas>
        <div id="game-message"></div>
    </div>

    <div class="controls-hint">Drag striker • Pull back to shoot</div>

<script>
    const canvas = document.getElementById('carromCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('game-message');

    // --- Game Config ---
    let BOARD_SIZE = 600; 
    let SCALE = 1;
    
    // Physics Constants
    const FRICTION = 0.985; // Slightly less friction for better glide
    const WALL_DAMPING = 0.6; 
    const SUB_STEPS = 4; // Physics runs 4 times per frame for accuracy
    
    // Physics Radii & Mass
    const STRIKER_RADIUS = 20; 
    const PIECE_RADIUS = 14; 
    const POCKET_RADIUS = 30;
    const MAX_POWER = 45;

    // --- Colors ---
    const COLORS = {
        board: '#f3e5ab',
        lines: '#2a2a2a',
        pocket: '#1a1a1a',
        aimLine: '#39ff14' 
    };

    // --- State ---
    let gameState = 'MENU';
    let turn = 'PLAYER'; // 'PLAYER' or 'CPU'
    let pieces = [];
    
    // Striker Object
    let striker = { 
        x: 0, y: 0, vx: 0, vy: 0, 
        radius: STRIKER_RADIUS, 
        mass: 4, // Striker is 4x heavier than pieces
        color: '#ffeb3b', 
        isStriker: true, 
        dragging: false,
        visible: true
    };
    
    let dragStart = null;
    let dragCurrent = null;
    let scores = { p1: 0, p2: 0 };
    let foulCommitted = false;

    // --- Resize Logic ---
    function resize() {
        const container = document.getElementById('game-container');
        const size = container.clientWidth; // Internal width
        canvas.width = size;
        canvas.height = size;
        BOARD_SIZE = size;
        SCALE = size / 600;
        
        // Update physics props
        striker.radius = STRIKER_RADIUS * SCALE;
        pieces.forEach(p => p.radius = PIECE_RADIUS * SCALE);
        
        // Reposition striker if resizing during aim
        if (gameState === 'AIMING') {
             const baselineY = (turn === 'PLAYER') ? canvas.height - (90 * SCALE) : (90 * SCALE);
             striker.y = baselineY;
        }
    }
    window.addEventListener('resize', () => { resize(); draw(); });

    // --- Initialization ---
    function createPiece(x, y, type) {
        return {
            x: x, y: y, vx: 0, vy: 0,
            radius: PIECE_RADIUS * SCALE,
            type: type, 
            mass: 1 // Standard mass
        };
    }

    function initGame() {
        resize();
        pieces = [];
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = PIECE_RADIUS * SCALE * 2.05;

        // 1. Queen
        pieces.push(createPiece(cx, cy, 'red'));

        // 2. Inner Circle (6 pieces)
        for(let i=0; i<6; i++) {
            const angle = i * 60 * Math.PI / 180;
            const type = (i % 2 !== 0) ? 'white' : 'black'; 
            pieces.push(createPiece(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r, type));
        }

        // 3. Outer Circle (12 pieces)
        const r2 = r * 1.95; 
        for(let i=0; i<12; i++) {
            const angle = (i * 30 + 15) * Math.PI / 180;
            const type = (i % 2 === 0) ? 'white' : 'black';
            pieces.push(createPiece(cx + Math.cos(angle)*r2, cy + Math.sin(angle)*r2, type));
        }

        scores = { p1: 0, p2: 0 };
        turn = 'PLAYER';
        resetStriker();
        updateUI();
    }

    function resetStriker() {
        // Stop any residual movement
        striker.vx = 0; striker.vy = 0;
        striker.visible = true;
        striker.dragging = false;
        foulCommitted = false;

        const margin = 65 * SCALE;
        striker.x = canvas.width / 2;
        
        // CPU plays from TOP, Player from BOTTOM
        if (turn === 'PLAYER') {
            striker.y = canvas.height - (90 * SCALE);
        } else {
            striker.y = (90 * SCALE);
        }

        gameState = 'AIMING';
        updateUI();

        // Trigger CPU if needed
        if(turn === 'CPU') {
            setTimeout(cpuTurn, 1000);
        }
    }

    function startGame() {
        document.getElementById('menu-overlay').style.display = 'none';
        initGame();
        gameLoop();
    }

    // --- Input Handling ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('touchstart', startDrag, {passive: false});
    canvas.addEventListener('mousemove', moveDrag);
    canvas.addEventListener('touchmove', moveDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        if(gameState !== 'AIMING' || turn !== 'PLAYER') return;
        const pos = getPos(e);
        // Hit test slightly larger for mobile ease
        if (Math.hypot(pos.x - striker.x, pos.y - striker.y) < striker.radius * 2.5) {
            e.preventDefault();
            striker.dragging = true;
            dragStart = { x: striker.x, y: striker.y };
            dragCurrent = pos;
        }
    }

    function moveDrag(e) {
        if(!striker.dragging) return;
        e.preventDefault();
        const pos = getPos(e);
        const baselineY = canvas.height - (90 * SCALE);

        // Logic: if vertical distance is small, we are SLIDING the striker
        // If vertical distance is large, we are AIMING
        const vertDist = Math.abs(pos.y - baselineY);
        
        if (vertDist < 40 * SCALE) {
            // Slide Mode
            dragStart = null; 
            const margin = 65 * SCALE;
            striker.x = Math.max(margin, Math.min(canvas.width - margin, pos.x));
            striker.y = baselineY; 
        } else {
            // Aim Mode
            if(!dragStart) dragStart = { x: striker.x, y: striker.y };
            dragCurrent = pos;
        }
    }

    function endDrag(e) {
        if(!striker.dragging) return;
        striker.dragging = false;

        if (dragStart && dragCurrent) {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 10 * SCALE) {
                const power = Math.min(dist * 0.15, MAX_POWER * SCALE);
                const angle = Math.atan2(dy, dx);
                shootStriker(power, angle);
            }
        }
        dragStart = null;
    }

    function shootStriker(power, angle) {
        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        gameState = 'MOVING';
    }

    // --- Physics Engine (Improved) ---
    function updatePhysics() {
        if(gameState !== 'MOVING') return;

        let totalKineticEnergy = 0;
        const allObjects = [...pieces];
        if (striker.visible) allObjects.push(striker);

        // Sub-stepping: Run physics multiple times per frame for stability
        for(let step = 0; step < SUB_STEPS; step++) {
            
            allObjects.forEach(obj => {
                // Move
                obj.x += obj.vx / SUB_STEPS;
                obj.y += obj.vy / SUB_STEPS;

                // Wall Collisions
                const r = obj.radius;
                const margin = 20 * SCALE;
                
                if(obj.x < margin + r) { obj.x = margin + r; obj.vx *= -WALL_DAMPING; }
                else if(obj.x > canvas.width - margin - r) { obj.x = canvas.width - margin - r; obj.vx *= -WALL_DAMPING; }
                
                if(obj.y < margin + r) { obj.y = margin + r; obj.vy *= -WALL_DAMPING; }
                else if(obj.y > canvas.height - margin - r) { obj.y = canvas.height - margin - r; obj.vy *= -WALL_DAMPING; }
            });

            // Object Collisions (Impulse Based)
            for (let i = 0; i < allObjects.length; i++) {
                for (let j = i + 1; j < allObjects.length; j++) {
                    const p1 = allObjects[i];
                    const p2 = allObjects[j];
                    
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distSq = dx*dx + dy*dy;
                    const minDist = p1.radius + p2.radius;

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq) || 0.001;
                        const nx = dx / dist; // Normal Vector X
                        const ny = dy / dist; // Normal Vector Y

                        // 1. Separate objects (prevent sticking)
                        const overlap = minDist - dist;
                        const totalMass = p1.mass + p2.mass;
                        const m1Ratio = p2.mass / totalMass;
                        const m2Ratio = p1.mass / totalMass;

                        p1.x -= nx * overlap * m1Ratio;
                        p1.y -= ny * overlap * m1Ratio;
                        p2.x += nx * overlap * m2Ratio;
                        p2.y += ny * overlap * m2Ratio;

                        // 2. Resolve Velocity (Elastic Collision)
                        // Relative Velocity
                        const rvx = p2.vx - p1.vx;
                        const rvy = p2.vy - p1.vy;
                        
                        // Velocity along normal
                        const velAlongNormal = rvx * nx + rvy * ny;

                        // Do not resolve if velocities are separating
                        if (velAlongNormal > 0) continue;

                        // Impulse scalar
                        let jVal = -(1 + 0.8) * velAlongNormal; // 0.8 is restitution (bounciness)
                        jVal /= (1 / p1.mass + 1 / p2.mass);

                        // Apply impulse
                        const impulseX = jVal * nx;
                        const impulseY = jVal * ny;

                        p1.vx -= impulseX / p1.mass;
                        p1.vy -= impulseY / p1.mass;
                        p2.vx += impulseX / p2.mass;
                        p2.vy += impulseY / p2.mass;
                    }
                }
            }
        }

        // Apply Friction & Check Energy (Once per frame)
        allObjects.forEach(obj => {
            obj.vx *= FRICTION;
            obj.vy *= FRICTION;
            
            if(Math.abs(obj.vx) < 0.05) obj.vx = 0;
            if(Math.abs(obj.vy) < 0.05) obj.vy = 0;
            
            totalKineticEnergy += Math.abs(obj.vx) + Math.abs(obj.vy);
        });

        checkPockets();

        if (totalKineticEnergy === 0) {
            handleTurnEnd();
        }
    }

    // --- Pocket Logic ---
    let pocketedColor = null;

    function checkPockets() {
        const pockets = [
            {x: 25*SCALE, y: 25*SCALE},
            {x: canvas.width - 25*SCALE, y: 25*SCALE},
            {x: 25*SCALE, y: canvas.height - 25*SCALE},
            {x: canvas.width - 25*SCALE, y: canvas.height - 25*SCALE}
        ];
        
        // Striker Foul
        if (striker.visible) {
            pockets.forEach(p => {
                if (Math.hypot(striker.x - p.x, striker.y - p.y) < POCKET_RADIUS * SCALE) {
                    striker.visible = false;
                    striker.vx = 0; striker.vy = 0;
                    foulCommitted = true;
                    showMsg("FOUL!", "#ff4444");
                }
            });
        }

        // Pieces
        for (let i = pieces.length - 1; i >= 0; i--) {
            const pc = pieces[i];
            let fell = false;
            pockets.forEach(p => {
                if (Math.hypot(pc.x - p.x, pc.y - p.y) < POCKET_RADIUS * SCALE) fell = true;
            });

            if (fell) {
                pocketedColor = pc.type;
                
                // Score Calculation
                if (pc.type === 'red') {
                    scores[turn === 'PLAYER' ? 'p1' : 'p2'] += 50;
                    showMsg("QUEEN!", "#d93025");
                } else if (pc.type === 'white') {
                    if (turn === 'PLAYER') { scores.p1 += 10; showMsg("Nice!", "#ffd700"); }
                    else { scores.p2 += 10; } // CPU pockets white
                } else if (pc.type === 'black') {
                    if (turn === 'CPU') { scores.p2 += 10; showMsg("CPU Score", "#ccc"); }
                    else { scores.p1 += 10; } // Player pockets black
                }
                pieces.splice(i, 1);
            }
        }
    }

    function handleTurnEnd() {
        let nextTurn = (turn === 'PLAYER') ? 'CPU' : 'PLAYER';
        
        // Penalty / Continue Turn Logic
        if (foulCommitted) {
            // Foul penalties can be added here (e.g., return a piece)
            // For now, just lose turn
            nextTurn = (turn === 'PLAYER') ? 'CPU' : 'PLAYER';
        } else if (pocketedColor) {
            // Valid pocket? Keep turn
            // Simplified: If you pocket ANYTHING (except opponent's strict color), you keep turn
            // To make it strict carrom: Player needs White/Red, CPU needs Black/Red.
            const isPlayer = turn === 'PLAYER';
            if (isPlayer && (pocketedColor === 'white' || pocketedColor === 'red')) nextTurn = 'PLAYER';
            else if (!isPlayer && (pocketedColor === 'black' || pocketedColor === 'red')) nextTurn = 'CPU';
        }

        // Reset variables
        pocketedColor = null;
        foulCommitted = false;
        
        // Game Over Check
        const whites = pieces.filter(p => p.type === 'white').length;
        const blacks = pieces.filter(p => p.type === 'black').length;
        const reds = pieces.filter(p => p.type === 'red').length;

        if (whites === 0 && reds === 0) endGame("You Win!");
        else if (blacks === 0 && reds === 0) endGame("CPU Wins!");
        else {
            turn = nextTurn;
            resetStriker();
        }
    }

    // --- CPU AI ---
    function cpuTurn() {
        if (turn !== 'CPU' || gameState !== 'AIMING') return;

        // 1. Find a target (Black or Red)
        const validTargets = pieces.filter(p => p.type === 'black' || p.type === 'red');
        let target = validTargets[Math.floor(Math.random() * validTargets.length)];
        // Fallback to any piece if no preferred targets
        if (!target && pieces.length > 0) target = pieces[0];

        if (target) {
            // 2. Position striker near the target horizontally
            const margin = 70 * SCALE;
            // Add some randomness to position
            let idealX = target.x + (Math.random() * 40 - 20);
            striker.x = Math.max(margin, Math.min(canvas.width - margin, idealX));
            
            // 3. Calculate Shot
            const dx = target.x - striker.x;
            const dy = target.y - striker.y;
            const angle = Math.atan2(dy, dx);
            
            // 4. Power calculation (distance based + random boost)
            const dist = Math.hypot(dx, dy);
            // Ensure enough power to reach
            let power = (dist * 0.08) + 15; 
            if(power > MAX_POWER) power = MAX_POWER;
            
            // 5. Shoot
            shootStriker(power * SCALE, angle);
        } else {
            // Just shoot down if board is empty (shouldn't happen unless game over)
            shootStriker(20 * SCALE, Math.PI/2);
        }
    }

    // --- Rendering ---
    function draw() {
        ctx.fillStyle = COLORS.board;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawCarromBoard();

        // Aim Line (Player Only)
        if (gameState === 'AIMING' && turn === 'PLAYER' && striker.dragging && dragStart && dragCurrent) {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            
            ctx.beginPath();
            ctx.moveTo(striker.x, striker.y);
            ctx.lineTo(striker.x + dx * 2.5, striker.y + dy * 2.5);
            ctx.strokeStyle = COLORS.aimLine; 
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Shadows
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

        pieces.forEach(drawPiece);
        if (striker.visible) {
            drawPiece(striker);
            // Active Player Indicator Ring
            if (gameState === 'AIMING') {
                ctx.beginPath();
                ctx.arc(striker.x, striker.y, striker.radius + 6, 0, Math.PI*2);
                ctx.strokeStyle = (turn === 'PLAYER') ? '#39ff14' : '#ff4444';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        ctx.shadowColor = 'transparent';
    }

    function drawCarromBoard() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const w = canvas.width;
        const h = canvas.height;

        // Pockets
        const pr = POCKET_RADIUS * SCALE;
        const margin = 25 * SCALE;
        ctx.fillStyle = '#1a1a1a';
        [[margin, margin], [w-margin, margin], [margin, h-margin], [w-margin, h-margin]].forEach(([px, py]) => {
            ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#5c3a21'; ctx.lineWidth = 4; ctx.stroke();
        });

        // Center Design
        ctx.beginPath(); ctx.arc(cx, cy, 75 * SCALE, 0, Math.PI*2);
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath();
        ctx.strokeStyle = '#d93025'; ctx.lineWidth = 1;
        for(let i=0; i<8; i++){
            const a = i * 45 * Math.PI/180;
            ctx.moveTo(cx, cy);
            ctx.quadraticCurveTo(cx + Math.cos(a+0.3)*40*SCALE, cy + Math.sin(a+0.3)*40*SCALE, cx + Math.cos(a)*75*SCALE, cy + Math.sin(a)*75*SCALE);
        }
        ctx.stroke();

        // Baselines
        const lineOffset = 90 * SCALE;
        const sideMargin = 60 * SCALE;
        drawBaseline(sideMargin, lineOffset, w - sideMargin, lineOffset); // Top (CPU)
        drawBaseline(sideMargin, h - lineOffset, w - sideMargin, h - lineOffset); // Bottom (Player)
        
        // Vertical connecting lines
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(lineOffset, sideMargin); ctx.lineTo(lineOffset, h - sideMargin); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w - lineOffset, sideMargin); ctx.lineTo(w - lineOffset, h - sideMargin); ctx.stroke();

        // Arrows
        drawArrow(cx, cy, margin + pr, margin + pr);
        drawArrow(cx, cy, w - margin - pr, margin + pr);
        drawArrow(cx, cy, margin + pr, h - margin - pr);
        drawArrow(cx, cy, w - margin - pr, h - margin - pr);
    }

    function drawBaseline(x1, y1, x2, y2) {
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x1, y1 - 25*SCALE); ctx.lineTo(x2, y2 - 25*SCALE); 
        if (y1 > canvas.height/2) { 
             ctx.beginPath(); ctx.moveTo(x1, y1 + 25*SCALE); ctx.lineTo(x2, y2 + 25*SCALE); 
        }
        ctx.stroke();
        const r = 10 * SCALE;
        ctx.fillStyle = '#d93025';
        ctx.beginPath(); ctx.arc(x1, y1, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(x2, y2, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    function drawArrow(cx, cy, px, py) {
        const angle = Math.atan2(py - cy, px - cx);
        const dist = 140 * SCALE;
        const startX = px - Math.cos(angle) * dist;
        const startY = py - Math.sin(angle) * dist;
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(px - Math.cos(angle)*50*SCALE, py - Math.sin(angle)*50*SCALE);
        ctx.stroke();
    }

    function drawPiece(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        
        let color1, color2;
        if (p.isStriker) { color1 = '#fffbe0'; color2 = '#e6c300'; }
        else if (p.type === 'white') { color1 = '#ffffff'; color2 = '#dcdcdc'; }
        else if (p.type === 'black') { color1 = '#4a4a4a'; color2 = '#1a1a1a'; }
        else { color1 = '#ff6666'; color2 = '#cc0000'; }

        try {
            const g = ctx.createRadialGradient(p.x - p.radius/3, p.y - p.radius/3, p.radius/10, p.x, p.y, p.radius);
            g.addColorStop(0, color1);
            g.addColorStop(1, color2);
            ctx.fillStyle = g;
        } catch (e) { ctx.fillStyle = color2; }

        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1; ctx.stroke();
    }

    function showMsg(txt, col) {
        msgEl.innerText = txt;
        msgEl.style.borderColor = col;
        msgEl.style.opacity = 1;
        msgEl.style.transform = "translate(-50%, -50%) scale(1.1)";
        setTimeout(() => {
            msgEl.style.opacity = 0;
            msgEl.style.transform = "translate(-50%, -50%) scale(1)";
        }, 1500);
    }

    function updateUI() {
        document.getElementById('p1-badge').className = turn === 'PLAYER' ? 'player-badge active' : 'player-badge';
        document.getElementById('p2-badge').className = turn === 'CPU' ? 'player-badge active' : 'player-badge';
        document.getElementById('score-p1').innerText = scores.p1;
        document.getElementById('score-p2').innerText = scores.p2;
    }

    function endGame(txt) {
        gameState = 'END';
        document.querySelector('.menu-card h1').innerText = txt;
        document.querySelector('.menu-card p').innerText = `Final: ${scores.p1} - ${scores.p2}`;
        document.querySelector('.btn').innerText = "PLAY AGAIN";
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    function gameLoop() {
        updatePhysics();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // Boot
    resize();

</script>
</body>
</html>
