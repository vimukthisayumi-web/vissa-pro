<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISSA PRO - Online Carrom</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        :root { --bg-dark: #0f172a; --wood-frame: #5c3a21; --board-surface: #f3e5ab; }
        body { margin: 0; padding: 0; background: #050510; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; touch-action: none; }
        
        .ui-top { position: absolute; top: 10px; width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .player-badge { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 10px; border: 2px solid rgba(255,255,255,0.1); }
        .player-badge.active { border-color: #ffd700; box-shadow: 0 0 15px gold; }
        .score-val { font-size: 20px; font-weight: bold; color: #ffd700; }

        #game-container { position: relative; border: 15px solid var(--wood-frame); border-radius: 20px; width: 95vw; height: 95vw; max-width: 500px; max-height: 500px; background: var(--board-surface); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #status-msg { position: absolute; bottom: 80px; background: rgba(0,0,0,0.7); padding: 5px 20px; border-radius: 20px; font-size: 14px; color: gold; }
    </style>
</head>
<body>

    <div class="ui-top">
        <div class="player-badge" id="p1-badge">
            <div id="p1-name" style="font-size:12px;">You</div>
            <div class="score-val" id="score-p1">0</div>
        </div>
        <div id="turn-indicator" style="color:gold; font-weight:bold;">VS</div>
        <div class="player-badge" id="p2-badge">
            <div class="score-val" id="score-p2">0</div>
            <div id="p2-name" style="font-size:12px;">Opponent</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="carromCanvas"></canvas>
    </div>

    <div id="status-msg">Connecting to Room...</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyAocTZebNq7XwT-uUG1Q0I1SG1jyBNWWwQ",
        authDomain: "vissaprocarrom.firebaseapp.com",
        projectId: "vissaprocarrom",
        storageBucket: "vissaprocarrom.firebasestorage.app",
        messagingSenderId: "722305696915",
        appId: "1:722305696915:web:056e8be25a245ac29c7966"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // URL එකෙන් Match ID එක සහ ක්‍රීඩකයා කවුද කියලා හොයාගැනීම
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('matchId');
    let myRole = ""; // "host" or "guest"
    let opponentUid = "";

    const canvas = document.getElementById('carromCanvas');
    const ctx = canvas.getContext('2d');
    
    let BOARD_SIZE = 500;
    let SCALE = 1;
    const FRICTION = 0.985;
    const STRIKER_RADIUS = 18;
    const PIECE_RADIUS = 13;
    const MAX_POWER = 40;

    let gameState = 'WAITING'; 
    let currentTurn = ""; // UID of the player
    let pieces = [];
    let striker = { x: 250, y: 400, vx: 0, vy: 0, radius: STRIKER_RADIUS, visible: true, dragging: false };
    let dragStart = null;
    let dragCurrent = null;

    // --- Firebase Sync Logic ---
    auth.onAuthStateChanged(user => {
        if (!user) return window.location.href = "index.html";
        
        // Match එකට Join වීම
        db.collection("active_matches").doc(matchId).onSnapshot(doc => {
            const data = doc.data();
            if (!data) return;

            // කවුද Host (ගහන්න පටන් ගන්න කෙනා) සහ Guest කවුද කියලා තීරණය කිරීම
            if (data.host === user.uid) {
                myRole = "host";
                opponentUid = data.guest;
                document.getElementById('p1-name').innerText = "You";
                document.getElementById('p2-name').innerText = "Opponent";
            } else {
                myRole = "guest";
                opponentUid = data.host;
                document.getElementById('p1-name').innerText = "Opponent";
                document.getElementById('p2-name').innerText = "You";
            }

            currentTurn = data.turn;
            document.getElementById('status-msg').innerText = (currentTurn === user.uid) ? "Your Turn!" : "Waiting for Opponent...";
            
            // අනිත් කෙනා ගහපු පාර මෙතනට Update වෙනවා
            if (data.lastShot && data.lastShot.player !== user.uid && gameState !== 'MOVING') {
                executeRemoteShot(data.lastShot.angle, data.lastShot.power, data.lastShot.strikerX);
            }

            if (gameState === 'WAITING') {
                initPieces();
                gameState = 'AIMING';
                render();
            }
        });
    });

    function initPieces() {
        // බෝඩ් එකේ මැද කාසි ටික පිළිවෙලට තැබීම (පැරණි logic එකමයි)
        const cx = 250; const cy = 250;
        pieces = [];
        pieces.push({x: cx, y: cy, vx:0, vy:0, radius: PIECE_RADIUS, type: 'red'});
        // මෙතනට අනිත් කාසි 18 එකතු කරන්න... (සරලව තැබිය හැක)
    }

    // Striker එක එහා මෙහා කරන කොට Firebase එකට යැවීම
    function updateStrikerPos(x) {
        if (currentTurn !== auth.currentUser.uid) return;
        striker.x = x;
        // Optimization: Striker එක අදින කොට හැම වෙලේම Firebase යවන්න එපා, Shot එක ගහන කොට පමණක් යවන්න
    }

    function shoot(power, angle) {
        if (currentTurn !== auth.currentUser.uid || gameState !== 'AIMING') return;

        // Firebase එකට Shot එකේ විස්තර යැවීම
        db.collection("active_matches").doc(matchId).update({
            lastShot: {
                player: auth.currentUser.uid,
                angle: angle,
                power: power,
                strikerX: striker.x,
                timestamp: Date.now()
            },
            turn: opponentUid // වාරය මාරු කිරීම
        });

        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        gameState = 'MOVING';
    }

    function executeRemoteShot(angle, power, startX) {
        // අනිත් ක්‍රීඩකයාගේ පැත්තෙන් පේන විදිහ (Mirroring)
        // උඩ ඉන්න ක්‍රීඩකයාට යට ක්‍රීඩකයා පේන්නේ උඩ ඉඳන් ගහනවා වගේ
        striker.x = startX;
        striker.y = (myRole === "host") ? 410 : 90; // Position swap based on role
        
        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        gameState = 'MOVING';
    }

    // --- Input Handling ---
    canvas.addEventListener('touchstart', e => {
        if(currentTurn !== auth.currentUser.uid) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const pos = { x: (touch.clientX - rect.left) * (500/rect.width), y: (touch.clientY - rect.top) * (500/rect.height) };
        
        if (Math.hypot(pos.x - striker.x, pos.y - striker.y) < 40) {
            striker.dragging = true;
            dragStart = { x: striker.x, y: striker.y };
        }
    });

    canvas.addEventListener('touchmove', e => {
        if(!striker.dragging) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const pos = { x: (touch.clientX - rect.left) * (500/rect.width), y: (touch.clientY - rect.top) * (500/rect.height) };
        
        // Horizontal sliding or Aiming logic
        if (Math.abs(pos.y - dragStart.y) < 30) {
            striker.x = Math.max(70, Math.min(430, pos.x));
        } else {
            dragCurrent = pos;
        }
        render();
    });

    canvas.addEventListener('touchend', () => {
        if(!striker.dragging) return;
        if(dragCurrent) {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const power = Math.min(Math.hypot(dx, dy) * 0.2, MAX_POWER);
            const angle = Math.atan2(dy, dx);
            shoot(power, angle);
        }
        striker.dragging = false;
        dragStart = dragCurrent = null;
    });

    // --- Physics & Render ---
    function updatePhysics() {
        if(gameState !== 'MOVING') return;
        // (මෙහිදී කලින් තිබූ Physics Logic එකම භාවිතා වේ)
        // කාසි වල චලනය අවසන් වූ පසු:
        // gameState = 'AIMING';
    }

    function render() {
        ctx.fillStyle = "#f3e5ab";
        ctx.fillRect(0,0,500,500);
        // බෝඩ් එක සහ කාසි ඇඳීම...
        
        // Striker
        ctx.beginPath();
        ctx.arc(striker.x, striker.y, STRIKER_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = "yellow";
        ctx.fill();
        
        // Aim Line
        if (striker.dragging && dragCurrent) {
            ctx.beginPath();
            ctx.moveTo(striker.x, striker.y);
            ctx.lineTo(striker.x + (dragStart.x - dragCurrent.x), striker.y + (dragStart.y - dragCurrent.y));
            ctx.strokeStyle = "green";
            ctx.stroke();
        }
    }

    function gameLoop() {
        updatePhysics();
        render();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

</script>
</body>
</html>
