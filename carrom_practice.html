<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vissa-Pro Elite Battle</title>
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .match-header { background: var(--card); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid var(--primary); }
        .p-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .p-balance { font-size: 20px; font-weight: bold; }
        .pot-box { border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px; color: var(--secondary); font-weight: bold; }
        #timer-wrap { width: 100%; height: 6px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.05s linear; }
        .game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #display-word { font-size: 65px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .color-btn { height: 80px; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #000; }
        .footer { background: var(--card); padding: 15px; display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="match-header">
        <div style="text-align:center">
            <div class="p-label">ඔබ</div>
            <div id="my-bal-ui" class="p-balance">Rs. 100</div>
        </div>
        <div class="pot-box">POT: <span id="pot-ui">Rs. 0</span></div>
        <div style="text-align:center">
            <div class="p-label">ප්‍රතිවාදියා</div>
            <div id="opp-bal-ui" class="p-balance">Rs. 100</div>
        </div>
    </div>

    <div id="timer-wrap"><div id="timer-fill"></div></div>

    <main class="game-zone">
        <div id="display-word">READY</div>
        <div class="btn-grid">
            <button class="color-btn" style="background:#ff4d4d" onclick="handleInput('red')"></button>
            <button class="color-btn" style="background:#1e90ff" onclick="handleInput('blue')"></button>
            <button class="color-btn" style="background:#2ed573" onclick="handleInput('green')"></button>
            <button class="color-btn" style="background:#ffa502" onclick="handleInput('yellow')"></button>
        </div>
    </main>

    <footer class="footer">
        <button id="btn-bet" class="action-btn" style="background:var(--primary)" onclick="startBet()">START BET (Rs. 15)</button>
        <button id="btn-cashout" class="action-btn" style="background:var(--secondary)" onclick="cashOut()">CASH OUT</button>
    </footer>

    <script>
        const colors = ["red", "blue", "green", "yellow"];
        let targetColor = "";
        let isGameActive = false;
        let myBal = 100;
        let oppBal = 100;
        const ROUND_FEE = 15;
        const WIN_PER_CLICK = 10;
        const MAX_LIMIT = 180;

        // --- Firebase වලට සම්බන්ධ කළ යුතු කොටස ---
        let iAmReady = false;
        let opponentReady = false; // මෙය Firebase එකෙන් listen කරන්න ඕනේ

        function startBet() {
            if(isGameActive || iAmReady) return;
            if(myBal < ROUND_FEE) { alert("සල්ලි මදි!"); return; }

            iAmReady = true;
            document.getElementById('btn-bet').innerText = "WAITING FOR OPPONENT...";
            document.getElementById('btn-bet').style.opacity = "0.5";

            // මෙතැනදී Firebase එකේ 'player_ready' එක true කරන්න
            // database.ref('rooms/room1/p1_ready').set(true);

            checkBothReady();
        }

        // දෙන්නම ලෑස්තිද කියලා පරීක්ෂා කරන function එක
        function checkBothReady() {
            // දැනට පරීක්ෂා කිරීම සඳහා තත්පර 3කට පසු ප්‍රතිවාදියා ආවා යැයි සලකමු
            // සැබෑ ඇප් එකේදී Firebase Listener එකක් මගින් මෙය සිදු වේ
            setTimeout(() => {
                opponentReady = true; // ප්‍රතිවාදියා ලෑස්ති වුණා කියලා හිතමු
                
                if(iAmReady && opponentReady) {
                    beginMatch();
                }
            }, 3000); 
        }

        function beginMatch() {
            myBal -= ROUND_FEE;
            document.getElementById('pot-ui').innerText = "Rs. " + (ROUND_FEE * 2);
            updateUI();
            isGameActive = true;
            document.getElementById('btn-bet').innerText = "MATCH LIVE!";
            nextRound();
        }

        function handleInput(choice) {
            if(!isGameActive) return;
            if(choice === targetColor) {
                myBal += WIN_PER_CLICK;
                oppBal -= WIN_PER_CLICK;
                updateUI();
                if(myBal >= MAX_LIMIT) {
                    alert("උපරිම සීමාවට පැමිණියා!");
                    window.location.href = "dashboard.html";
                }
                nextRound();
            } else {
                endGame("වැරදියි! ඔබ පැරදුණා. (රු. 15 පද්ධතියට)");
            }
        }

        function nextRound() {
            let txt = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            let el = document.getElementById('display-word');
            el.innerText = txt.toUpperCase();
            el.style.color = targetColor;
            
            // Timer එක පටන් ගැනීම
            startTimer();
        }

        let timer;
        function startTimer() {
            clearInterval(timer);
            let start = Date.now();
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let prog = Math.max(0, 100 - (diff / 1500 * 100));
                document.getElementById('timer-fill').style.width = prog + "%";
                if(diff >= 1500) endGame("කාලය අවසන්!");
            }, 20);
        }

        function endGame(msg) {
            isGameActive = false;
            clearInterval(timer);
            alert(msg);
            location.reload();
        }

        function updateUI() {
            document.getElementById('my-bal-ui').innerText = "Rs. " + myBal;
            document.getElementById('opp-bal-ui').innerText = "Rs. " + oppBal;
        }

        function cashOut() {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
