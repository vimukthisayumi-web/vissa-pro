<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Betting Battle</title>
    <style>
        body { 
            font-family: sans-serif; text-align: center; background-color: #121212; 
            color: white; margin: 0; padding: 0; overflow: hidden;
        }
        .header {
            background: #1e1e1e; padding: 15px; display: flex;
            justify-content: space-around; align-items: center; border-bottom: 2px solid #ff4757;
        }
        .pot-area { background: #333; padding: 5px 15px; border-radius: 20px; border: 1px solid #ff4757; }
        .pot-amount { color: #2ed573; font-weight: bold; font-size: 18px; }

        #timer-bar { width: 100%; height: 6px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: #ff4757; }

        #color-text { font-size: 60px; font-weight: 900; margin: 60px 0; text-transform: uppercase; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; margin: 0 auto; }
        .color-btn { height: 70px; border: none; border-radius: 12px; cursor: pointer; transition: 0.1s; }
        .color-btn:active { transform: scale(0.95); }

        .controls { position: fixed; bottom: 0; width: 100%; display: flex; gap: 10px; padding: 15px; background: #1e1e1e; box-sizing: border-box; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bet-btn { background: #ff4757; color: white; }
        .cashout-btn { background: #2ed573; color: white; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div>ඔබ<br><span id="my-score">0</span></div>
        <div class="pot-area">POT: <span id="total-pot" class="pot-amount">Rs. 0</span></div>
        <div>ප්‍රතිවාදියා<br><span id="opp-score">0</span></div>
    </div>

    <div id="timer-bar"><div id="timer-fill"></div></div>

    <div id="color-text">READY</div>

    <div class="btn-grid">
        <button class="color-btn" style="background:red" onclick="handleInput('red')"></button>
        <button class="color-btn" style="background:blue" onclick="handleInput('blue')"></button>
        <button class="color-btn" style="background:green" onclick="handleInput('green')"></button>
        <button class="color-btn" style="background:yellow" onclick="handleInput('yellow')"></button>
    </div>

    <footer class="controls">
        <button id="bet-btn" class="action-btn bet-btn" onclick="placeBet()">START BET</button>
        <button id="cashout-btn" class="action-btn cashout-btn" onclick="cashOut()">CASH OUT</button>
    </footer>

    <script>
        let colors = ["red", "blue", "green", "yellow"];
        let targetColor = "";
        let score = 0;
        let isGameActive = false;
        let timer;
        const TIME_LIMIT = 1500; // 1.5 Seconds

        function placeBet() {
            // බොත්තම එබූ විට මෙතැනින් ක්‍රීඩාව ආරම්භ වේ
            isGameActive = true;
            score = 0;
            document.getElementById('my-score').innerText = "0";
            document.getElementById('total-pot').innerText = "Rs. 200"; // මෙතන ඔට්ටු මුදල
            document.getElementById('bet-btn').innerText = "LIVE...";
            document.getElementById('bet-btn').style.background = "#555";
            document.getElementById('cashout-btn').style.opacity = "1";
            
            nextRound();
        }

        function nextRound() {
            if(!isGameActive) return;
            
            let randomText = colors[Math.floor(Math.random() * colors.length)];
            targetColor = colors[Math.floor(Math.random() * colors.length)];
            
            let display = document.getElementById('color-text');
            display.innerText = randomText.toUpperCase();
            display.style.color = targetColor;
            
            runTimer();
        }

        function runTimer() {
            clearInterval(timer);
            let start = Date.now();
            
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let progress = Math.max(0, 100 - (diff / TIME_LIMIT * 100));
                document.getElementById('timer-fill').style.width = progress + "%";
                
                if(diff >= TIME_LIMIT) {
                    endGame("පරාජිතයි! කාලය අවසන්.");
                }
            }, 20);
        }

        function handleInput(choice) {
            if(!isGameActive) return;
            
            if(choice === targetColor) {
                score++;
                document.getElementById('my-score').innerText = score;
                nextRound();
            } else {
                endGame("පරාජිතයි! වැරදි වර්ණයක්.");
            }
        }

        function endGame(msg) {
            isGameActive = false;
            clearInterval(timer);
            alert(msg);
            location.reload(); // Game එක reset කරන්න
        }

        function cashOut() {
            if(!isGameActive) return;
            if(score < 5) {
                alert("අවම ලකුණු 5 ක් අවශ්‍යයි!");
                return;
            }
            isGameActive = false;
            clearInterval(timer);
            alert("සුභ පැතුම්! ඔබ ජයග්‍රහණය කළා.");
            location.reload();
        }
    </script>
</body>
</html>
