<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISSA PRO Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a4f 0%, #08051a 100%); 
            color: white; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* පසුබිමේ තරු */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            z-index: -1;
            box-shadow: 10vw 20vh 1px #fff, 50vw 40vh 1px #fff, 80vw 10vh 1px #fff, 20vw 80vh 1px #fff, 70vw 70vh 1px #fff;
            opacity: 0.3;
        }

        /* Game Icon එක */
        .game-logo {
            width: 100px;
            height: 100px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #ffcc00;
            border: 4px solid white;
        }

        .login-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            border-radius: 25px; 
            width: 85%; 
            max-width: 350px;
            text-align: center; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px #fff; }
        p { color: #ccc; font-size: 14px; margin-bottom: 30px; }

        .google-btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            background: linear-gradient(45deg, #f09, #30f, #0cf, #f09); 
            background-size: 400%;
            animation: moveGradient 5s infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .footer-links { margin-top: 30px; font-size: 12px; color: #888; }
        .footer-links span { color: #ffcc00; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="game-logo">
        <span style="font-size: 50px;">🎮</span>
    </div>

    <h1>VISSA PRO</h1>
    <p>ඔබේ ක්‍රීඩාව තෝරන්න</p>

    <div class="login-box">
        <button class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="background:white; border-radius:50%; padding:2px;">
            LOGIN WITH GOOGLE
        </button>
    </div>

    <div class="footer-links">
        By continuing you agree to our <br>
        <span>TERMS</span> & <span>PRIVACY POLICY</span>
    </div>

</body>
</html>
